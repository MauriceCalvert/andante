fugue_4voice:
  voices: 4
  treatments: [statement, sequence, fragmentation, stretto, statement]
  climax: late
  surprise: null
  surprise_type: null
  voice_entries:
    # Exposition: staggered subject entries with tonal answers
    - phrase: 0
      voices:
        soprano: {treatment: statement, source: subject}
        alto: {treatment: rest}
        tenor: {treatment: rest}
        bass: {treatment: rest}
    - phrase: 1
      voices:
        soprano: {treatment: counter_subject}
        alto: {treatment: statement, source: subject, interval: -4}
        tenor: {treatment: rest}
        bass: {treatment: rest}
    - phrase: 2
      voices:
        soprano: {treatment: sequence, source: counter_subject}
        alto: {treatment: counter_subject}
        tenor: {treatment: statement, source: subject, interval: -7}
        bass: {treatment: rest}
    - phrase: 3
      voices:
        soprano: {treatment: fragmentation, source: subject}
        alto: {treatment: sequence, source: counter_subject}
        tenor: {treatment: counter_subject}
        bass: {treatment: statement, source: subject, interval: -11}

