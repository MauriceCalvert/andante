# Surprise Types - Strategic deviations from expectation
# Each surprise modifies cadence, register, or rhythm

# Surprise placement rules
placement:
  min_phrases_before: 2
  never_on_final: true
  prefer_before_cadence: true

types:
  deceptive_cadence:
    description: V resolves to vi instead of I
    category: harmonic
    cadence_override: deceptive
    register_shift: 0
    magnitude: minor

  evaded_cadence:
    description: Cadence interrupted, phrase continues
    category: harmonic
    cadence_override: null
    register_shift: 0
    magnitude: minor

  hemiola:
    description: Metric grouping shift (half notes against quarters)
    category: rhythmic
    cadence_override: null
    register_shift: 0
    rhythm_override: hemiola
    magnitude: minor

  registral_displacement:
    description: Sudden leap to unexpected register
    category: melodic
    cadence_override: null
    register_shift: 7
    magnitude: major

  sequence_break:
    description: Sequential pattern breaks unexpectedly after 2 units
    category: melodic
    cadence_override: null
    register_shift: 0
    fill_override: sequence_break
    magnitude: minor

  subito_forte:
    description: Sudden rise in register (louder)
    category: textural
    cadence_override: null
    register_shift: 5
    magnitude: minor

  subito_piano:
    description: Sudden drop in register (softer)
    category: textural
    cadence_override: null
    register_shift: -5
    magnitude: minor

