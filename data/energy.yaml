# Energy Levels - Dynamic character of phrases
# Each level modifies register, rhythm density, and articulation

levels:
  falling:
    register_shift: -2
    rhythm_override: straight
    articulation: legato
    description: Releasing tension

  low:
    register_shift: -3
    rhythm_override: straight
    articulation: legato
    description: Calm, grounded

  moderate:
    register_shift: 0
    rhythm_override: null
    articulation: null
    description: Active but balanced

  peak:
    register_shift: 5
    rhythm_override: null
    articulation: accent
    description: Maximum intensity

  resolving:
    register_shift: -2
    rhythm_override: straight
    articulation: legato
    description: Moving toward closure

  rising:
    register_shift: 2
    rhythm_override: null
    articulation: null
    description: Building momentum

  stable:
    register_shift: 0
    rhythm_override: null
    articulation: null
    description: Neutral, balanced

  suspenseful:
    register_shift: 0
    rhythm_override: null
    articulation: staccato
    description: Tension without release

  plateau:
    register_shift: 1
    rhythm_override: null
    articulation: null
    description: Sustained elevated energy

  intensification:
    register_shift: 3
    rhythm_override: null
    articulation: accent
    description: Rapid energy increase