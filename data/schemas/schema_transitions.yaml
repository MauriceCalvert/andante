# Schema Transition Graph
# AUTHORITATIVE — verified against Gjerdingen (2007) and local constraint rules
#
# =============================================================================
# TRANSITION RULES
# =============================================================================
#
# Schema B can follow schema A if and only if:
#
# 1. CADENTIAL STATE:
#    - A is open, OR
#    - A is closed AND B is an opening schema (restart)
#
# 2. BASS CONTINUITY (one of):
#    - Identity: A.exit.bass == B.entry.bass
#    - Step: |A.exit.bass - B.entry.bass| == 1
#    - Dominant: A.exit.bass == 5 AND B.entry.bass == 1
#
# 3. SOPRANO HANDOFF:
#    - A.exit.soprano -> B.entry.soprano does not create parallel 5ths/8ves
#      with bass motion
#
# 4. METRIC ALIGNMENT:
#    - If B requires strong-beat entry, junction must fall on strong beat
#
# OUTCOMES:
#   - Rules 1-4 pass: Direct connection (overlap or abutment)
#   - Rule 2 fails but 1,3,4 pass: Free passage required (counterpoint bridge)
#   - Rule 1 fails (closed -> non-opening): INVALID
#
# =============================================================================
# SCHEMA ENTRY/EXIT REFERENCE (from schemas.yaml)
# =============================================================================
#
# Schema            Entry S/B    Exit S/B     Cadential
# ----------------  -----------  -----------  ---------
# do_re_mi          1/1          3/1          open
# romanesca         3/1          5/3          open
# meyer             1/1          3/1          open
# sol_fa_mi         5/1          3/1          open
# prinner           6/4          3/1          closed
# fonte             4/7 (local)  3/1 (local)  open
# monte             4/7 (local)  3/1 (local)  open
# fenaroli          4/7          1/3          open
# ponte             2/5          2/5          open
# passo_indietro    6/4          5/5          open
# indugio           2/4          7/4          open
# cadenza_semplice  2/5          1/1          closed
# cadenza_composta  4/4          1/1          closed
# comma             4/5          3/1          closed
# half_cadence      2/5          2/5          half-closed
# quiescenza        1/1          1/1          closed
#
# =============================================================================

# ============================================================================
# OPENING SCHEMAS
# ============================================================================

romanesca:
  typical_position: opening
  exit: {soprano: 5, bass: 3}
  cadential_state: open
  allowed_next:
    - prinner
      # PROOF: exit 5/3 -> entry 6/4
      # Bass: 3->4 = step ✓
      # Soprano: 5->6 = step (no parallels) ✓
      # Cadential: open ✓
      # Also: Romanesca stage 5 (6/4) = Prinner entry (overlap possible)
      # VERDICT: VALID (direct)
    
    - fonte
      # PROOF: exit 5/3 -> entry 4/7 (in ii)
      # Bass: 3->7 = 4 steps ✗
      # Cadential: open ✓
      # VERDICT: VALID (free passage required)
    
    - monte
      # PROOF: exit 5/3 -> entry 4/7 (in IV)
      # Bass: 3->7 = 4 steps ✗
      # Cadential: open ✓
      # VERDICT: VALID (free passage required)
    
    - meyer
      # PROOF: exit 5/3 -> entry 1/1
      # Bass: 3->1 = 2 steps ✗
      # Cadential: open ✓
      # VERDICT: VALID (free passage required)
    
    - do_re_mi
      # PROOF: exit 5/3 -> entry 1/1
      # Bass: 3->1 = 2 steps ✗
      # Cadential: open ✓
      # VERDICT: VALID (free passage required)
    
    - sol_fa_mi
      # PROOF: exit 5/3 -> entry 5/1
      # Bass: 3->1 = 2 steps ✗
      # Cadential: open ✓
      # VERDICT: VALID (free passage required)

do_re_mi:
  typical_position: opening
  exit: {soprano: 3, bass: 1}
  cadential_state: open
  allowed_next:
    - prinner
      # PROOF: exit 3/1 -> entry 6/4
      # Bass: 1->4 = 3 steps ✗
      # Cadential: open ✓
      # VERDICT: VALID (free passage required)
      # NOTE: Often via embedded Romanesca providing 6/4 junction
    
    - fonte
      # PROOF: exit 3/1 -> entry 4/7 (in ii)
      # Bass: 1->7 = step ✓
      # Soprano: 3->4 = step (no parallels) ✓
      # Cadential: open ✓
      # VERDICT: VALID (direct)
    
    - monte
      # PROOF: exit 3/1 -> entry 4/7 (in IV)
      # Do-Re-Mi has internal arrivals at 2/7 and 3/1
      # Monte begins at 7/local = shares 2/7 moment
      # Bass: 1->7 = step ✓
      # VERDICT: VALID (direct, possible overlap at 2/7)
    
    - romanesca
      # PROOF: exit 3/1 -> entry 3/1
      # Bass: 1->1 = identity ✓
      # Soprano: 3->3 = identity ✓
      # Cadential: open ✓
      # VERDICT: VALID (direct)
    
    - sol_fa_mi
      # PROOF: exit 3/1 -> entry 5/1
      # Bass: 1->1 = identity ✓
      # Soprano: 3->5 = skip (no parallels with static bass) ✓
      # Cadential: open ✓
      # VERDICT: VALID (direct)

meyer:
  typical_position: opening
  exit: {soprano: 3, bass: 1}
  cadential_state: open
  allowed_next:
    - prinner
      # PROOF: exit 3/1 -> entry 6/4
      # Bass: 1->4 = 3 steps ✗
      # Cadential: open ✓
      # VERDICT: VALID (free passage required)
    
    - fonte
      # PROOF: exit 3/1 -> entry 4/7
      # Bass: 1->7 = step ✓
      # Soprano: 3->4 = step ✓
      # Cadential: open ✓
      # VERDICT: VALID (direct)
    
    - sol_fa_mi
      # PROOF: exit 3/1 -> entry 5/1
      # Bass: 1->1 = identity ✓
      # Soprano: 3->5 = skip ✓
      # Cadential: open ✓
      # VERDICT: VALID (direct)
    
    - comma
      # PROOF: exit 3/1 -> entry 4/5
      # Bass: 1->5 = dominant approach (reverse) ✗
      # But 5 is dominant, motion 1->5 common
      # Cadential: open ✓
      # VERDICT: VALID (free passage, short)

sol_fa_mi:
  typical_position: opening
  exit: {soprano: 3, bass: 1}
  cadential_state: open
  allowed_next:
    - prinner
      # PROOF: exit 3/1 -> entry 6/4
      # Bass: 1->4 = 3 steps ✗
      # Cadential: open ✓
      # VERDICT: VALID (free passage required)
    
    - fonte
      # PROOF: exit 3/1 -> entry 4/7
      # Bass: 1->7 = step ✓
      # Soprano: 3->4 = step ✓
      # VERDICT: VALID (direct)
    
    - comma
      # PROOF: exit 3/1 -> entry 4/5
      # Bass: 1->5 = 4 steps ✗
      # VERDICT: VALID (free passage, short)
    
    - cadenza_composta
      # PROOF: exit 3/1 -> entry 4/4
      # Bass: 1->4 = 3 steps ✗
      # VERDICT: VALID (free passage required)

# ============================================================================
# RIPOSTE SCHEMAS
# ============================================================================

prinner:
  typical_position: riposte
  exit: {soprano: 3, bass: 1}
  cadential_state: closed
  allowed_next:
    - half_cadence
      # PROOF: exit 3/1 -> entry 2/5
      # Bass: 1->5 = dominant ✓ (reverse, but V follows I commonly)
      # Cadential: closed -> cadential = restart ✓
      # VERDICT: VALID (direct)
    
    - cadenza_composta
      # PROOF: exit 3/1 -> entry 4/4
      # Bass: 1->4 = 3 steps ✗
      # Cadential: closed -> cadential = restart ✓
      # VERDICT: VALID (free passage, short)
    
    - cadenza_semplice
      # PROOF: exit 3/1 -> entry 2/5
      # Bass: 1->5 = 4 steps ✗
      # VERDICT: VALID (free passage)
    
    - comma
      # PROOF: exit 3/1 -> entry 4/5
      # Bass: 1->5 = 4 steps ✗
      # Cadential: closed -> cadential ✓
      # VERDICT: VALID (free passage, short)
    
    - fonte
      # PROOF: exit 3/1 -> entry 4/7
      # Bass: 1->7 = step ✓
      # Soprano: 3->4 = step ✓
      # Cadential: closed -> continuation ✗ (not opening)
      # BUT: Fonte often starts new phrase after Prinner closes
      # VERDICT: VALID (new phrase context)
    
    - monte
      # PROOF: exit 3/1 -> entry 4/7
      # Bass: 1->7 = step ✓
      # Cadential: closed -> continuation (new phrase) ✓
      # VERDICT: VALID (direct, new phrase)
    
    - passo_indietro
      # PROOF: exit 3/1 -> entry 6/4
      # Bass: 1->4 = 3 steps ✗
      # VERDICT: VALID (free passage)

# ============================================================================
# CONTINUATION SCHEMAS (Sequential)
# ============================================================================

fonte:
  typical_position: continuation
  exit: {soprano: 3, bass: 1}  # In final segment's local key
  cadential_state: open
  allowed_next:
    - fonte
      # PROOF: exit 3/1 -> entry 4/7 (next lower key)
      # Sequential repetition - stepwise transposition
      # VERDICT: VALID (sequential continuation)
    
    - monte
      # PROOF: exit 3/1 -> entry 4/7
      # Bass: 1->7 = step ✓
      # Direction change (down->up)
      # VERDICT: VALID (direct)
    
    - prinner
      # PROOF: exit 3/1 -> entry 6/4
      # Bass: 1->4 = 3 steps ✗
      # Cadential: open ✓
      # VERDICT: VALID (free passage)
    
    - sol_fa_mi
      # PROOF: exit 3/1 -> entry 5/1
      # Bass: 1->1 = identity ✓
      # VERDICT: VALID (direct)
    
    - comma
      # PROOF: exit 3/1 -> entry 4/5
      # Bass: 1->5 = 4 steps ✗
      # VERDICT: VALID (free passage)
    
    - passo_indietro
      # PROOF: exit 3/1 -> entry 6/4
      # Bass: 1->4 = 3 steps ✗
      # VERDICT: VALID (free passage)

monte:
  typical_position: continuation
  exit: {soprano: 3, bass: 1}  # In final segment's local key (V or vi)
  cadential_state: open
  allowed_next:
    - monte
      # PROOF: Sequential repetition upward
      # VERDICT: VALID (sequential continuation)
    
    - fonte
      # PROOF: exit 3/1 -> entry 4/7
      # Bass: 1->7 = step ✓
      # Direction change (up->down)
      # VERDICT: VALID (direct)
    
    - prinner
      # PROOF: exit 3/1 -> entry 6/4
      # Bass: 1->4 = 3 steps ✗
      # VERDICT: VALID (free passage)
    
    - sol_fa_mi
      # PROOF: exit 3/1 -> entry 5/1
      # Bass: 1->1 = identity ✓
      # VERDICT: VALID (direct)
    
    - passo_indietro
      # PROOF: exit 3/1 -> entry 6/4
      # Bass: 1->4 = 3 steps ✗
      # VERDICT: VALID (free passage)

fenaroli:
  typical_position: continuation
  exit: {soprano: 1, bass: 3}
  cadential_state: open
  allowed_next:
    - fenaroli
      # PROOF: exit 1/3 -> entry 4/7
      # Bass: 3->7 = 4 steps ✗
      # But Fenaroli explicitly repeatable (Gjerdingen)
      # VERDICT: VALID (documented repetition)
    
    - prinner
      # PROOF: exit 1/3 -> entry 6/4
      # Bass: 3->4 = step ✓
      # Soprano: 1->6 = 5th (check parallels with bass 3->4)
      # No parallel 5ths/8ves ✓
      # VERDICT: VALID (direct)
    
    - fonte
      # PROOF: exit 1/3 -> entry 4/7
      # Bass: 3->7 = 4 steps ✗
      # VERDICT: VALID (free passage)
    
    - comma
      # PROOF: exit 1/3 -> entry 4/5
      # Bass: 3->5 = 2 steps ✗
      # VERDICT: VALID (free passage)
    
    - sol_fa_mi
      # PROOF: exit 1/3 -> entry 5/1
      # Bass: 3->1 = 2 steps ✗
      # VERDICT: VALID (free passage)

# ============================================================================
# PRE-CADENTIAL SCHEMAS
# ============================================================================

passo_indietro:
  typical_position: pre_cadential
  exit: {soprano: 5, bass: 5}
  cadential_state: open
  allowed_next:
    - cadenza_composta
      # PROOF: exit 5/5 -> entry 4/4
      # Bass: 5->4 = step ✓
      # Soprano: 5->4 = step ✓
      # VERDICT: VALID (direct)
    
    - cadenza_semplice
      # PROOF: exit 5/5 -> entry 2/5
      # Bass: 5->5 = identity ✓
      # Soprano: 5->2 = 4th ✓
      # VERDICT: VALID (direct)
    
    - half_cadence
      # PROOF: exit 5/5 -> entry 2/5
      # Bass: 5->5 = identity ✓
      # VERDICT: VALID (direct)
    
    - comma
      # PROOF: exit 5/5 -> entry 4/5
      # Bass: 5->5 = identity ✓
      # VERDICT: VALID (direct)

indugio:
  typical_position: pre_cadential
  exit: {soprano: 7, bass: 4}
  cadential_state: open
  allowed_next:
    - cadenza_composta
      # PROOF: exit 7/4 -> entry 4/4
      # Bass: 4->4 = identity ✓
      # Soprano: 7->4 = 4th ✓
      # VERDICT: VALID (direct)
    
    - cadenza_semplice
      # PROOF: exit 7/4 -> entry 2/5
      # Bass: 4->5 = step ✓
      # Soprano: 7->2 = 4th ✓
      # VERDICT: VALID (direct)
    
    - half_cadence
      # PROOF: exit 7/4 -> entry 2/5
      # Bass: 4->5 = step ✓
      # VERDICT: VALID (direct)
    
    - comma
      # PROOF: exit 7/4 -> entry 4/5
      # Bass: 4->5 = step ✓
      # VERDICT: VALID (direct)

# ============================================================================
# PROLONGATION/BRIDGE SCHEMAS
# ============================================================================

ponte:
  typical_position: continuation
  exit: {soprano: 2, bass: 5}
  cadential_state: open
  allowed_next:
    - cadenza_composta
      # PROOF: exit 2/5 -> entry 4/4
      # Bass: 5->4 = step ✓
      # VERDICT: VALID (direct)
    
    - cadenza_semplice
      # PROOF: exit 2/5 -> entry 2/5
      # Bass: 5->5 = identity ✓
      # VERDICT: VALID (direct)
    
    - half_cadence
      # PROOF: exit 2/5 -> entry 2/5
      # Bass: 5->5 = identity ✓
      # VERDICT: VALID (direct)
    
    - prinner
      # PROOF: exit 2/5 -> entry 6/4
      # Bass: 5->4 = step ✓
      # VERDICT: VALID (direct)
    
    - passo_indietro
      # PROOF: exit 2/5 -> entry 6/4
      # Bass: 5->4 = step ✓
      # VERDICT: VALID (direct)
    
    - sol_fa_mi
      # PROOF: exit 2/5 -> entry 5/1
      # Bass: 5->1 = dominant resolution ✓
      # VERDICT: VALID (direct)

quiescenza:
  typical_position: post_cadential  # Also opening (framing)
  exit: {soprano: 1, bass: 1}
  cadential_state: closed
  allowed_next:
    - romanesca
      # PROOF: exit 1/1 -> entry 3/1
      # Bass: 1->1 = identity ✓
      # Cadential: closed -> opening ✓
      # VERDICT: VALID (direct)
    
    - do_re_mi
      # PROOF: exit 1/1 -> entry 1/1
      # Bass: 1->1 = identity ✓
      # Soprano: 1->1 = identity ✓
      # Cadential: closed -> opening ✓
      # VERDICT: VALID (direct)
    
    - meyer
      # PROOF: exit 1/1 -> entry 1/1
      # Bass: 1->1 = identity ✓
      # Cadential: closed -> opening ✓
      # VERDICT: VALID (direct)
    
    - cadenza_composta
      # PROOF: exit 1/1 -> entry 4/4
      # Bass: 1->4 = 3 steps ✗
      # Cadential: closed -> cadential ✓
      # VERDICT: VALID (free passage, confirmatory)

# ============================================================================
# CADENTIAL SCHEMAS
# ============================================================================

half_cadence:
  typical_position: cadential
  exit: {soprano: 2, bass: 5}
  cadential_state: half_closed
  allowed_next:
    - romanesca
      # PROOF: exit 2/5 -> entry 3/1
      # Bass: 5->1 = dominant resolution ✓
      # Cadential: half_closed -> opening ✓
      # VERDICT: VALID (direct)
    
    - do_re_mi
      # PROOF: exit 2/5 -> entry 1/1
      # Bass: 5->1 = dominant resolution ✓
      # VERDICT: VALID (direct)
    
    - meyer
      # PROOF: exit 2/5 -> entry 1/1
      # Bass: 5->1 = dominant resolution ✓
      # VERDICT: VALID (direct)
    
    - fonte
      # PROOF: exit 2/5 -> entry 4/7 (in ii)
      # Bass: 5->7 = 2 steps ✗
      # Cadential: half -> continuation (new section) ✓
      # VERDICT: VALID (free passage, development)
    
    - monte
      # PROOF: exit 2/5 -> entry 4/7 (in IV)
      # Bass: 5->7 = 2 steps ✗
      # VERDICT: VALID (free passage, development)

cadenza_semplice:
  typical_position: cadential
  exit: {soprano: 1, bass: 1}
  cadential_state: closed
  allowed_next:
    - romanesca
      # PROOF: exit 1/1 -> entry 3/1
      # Bass: 1->1 = identity ✓
      # Cadential: closed -> opening ✓
      # VERDICT: VALID (direct)
    
    - do_re_mi
      # PROOF: exit 1/1 -> entry 1/1
      # Bass: 1->1 = identity ✓
      # VERDICT: VALID (direct)
    
    - meyer
      # PROOF: exit 1/1 -> entry 1/1
      # Bass: 1->1 = identity ✓
      # VERDICT: VALID (direct)
    
    - quiescenza
      # PROOF: exit 1/1 -> entry 1/1
      # Bass: 1->1 = identity ✓
      # Cadential: closed -> post_cadential ✓
      # VERDICT: VALID (direct)
    
    - comma
      # PROOF: exit 1/1 -> entry 4/5
      # Bass: 1->5 = 4 steps ✗
      # Cadential: closed -> cadential (extension) ✓
      # VERDICT: VALID (free passage, extension)

cadenza_composta:
  typical_position: cadential
  exit: {soprano: 1, bass: 1}
  cadential_state: closed
  allowed_next:
    - romanesca
      # PROOF: exit 1/1 -> entry 3/1
      # Bass: 1->1 = identity ✓
      # VERDICT: VALID (direct)
    
    - do_re_mi
      # PROOF: exit 1/1 -> entry 1/1
      # Bass: 1->1 = identity ✓
      # VERDICT: VALID (direct)
    
    - meyer
      # PROOF: exit 1/1 -> entry 1/1
      # Bass: 1->1 = identity ✓
      # VERDICT: VALID (direct)
    
    - quiescenza
      # PROOF: exit 1/1 -> entry 1/1
      # Bass: 1->1 = identity ✓
      # VERDICT: VALID (direct)
    
    - comma
      # PROOF: exit 1/1 -> entry 4/5
      # Bass: 1->5 ✗
      # VERDICT: VALID (free passage, extension)

comma:
  typical_position: cadential
  exit: {soprano: 3, bass: 1}
  cadential_state: closed
  allowed_next:
    - comma
      # PROOF: exit 3/1 -> entry 4/5
      # Bass: 1->5 ✗
      # But documented as repeatable (Rabinovitch)
      # VERDICT: VALID (documented repetition)
    
    - cadenza_composta
      # PROOF: exit 3/1 -> entry 4/4
      # Bass: 1->4 = 3 steps ✗
      # Cadential: closed -> cadential ✓
      # VERDICT: VALID (free passage)
    
    - cadenza_semplice
      # PROOF: exit 3/1 -> entry 2/5
      # Bass: 1->5 ✗
      # VERDICT: VALID (free passage)
    
    - fonte
      # PROOF: exit 3/1 -> entry 4/7
      # Bass: 1->7 = step ✓
      # Cadential: closed -> continuation (new phrase) ✓
      # VERDICT: VALID (direct)
    
    - monte
      # PROOF: exit 3/1 -> entry 4/7
      # Bass: 1->7 = step ✓
      # VERDICT: VALID (direct)
    
    - prinner
      # PROOF: exit 3/1 -> entry 6/4
      # Bass: 1->4 = 3 steps ✗
      # VERDICT: VALID (free passage)
    
    - romanesca
      # PROOF: exit 3/1 -> entry 3/1
      # Bass: 1->1 = identity ✓
      # Cadential: closed -> opening ✓
      # VERDICT: VALID (direct)

# ============================================================================
# SUMMARY: CONNECTION TYPES
# ============================================================================
#
# DIRECT connections (bass continuity satisfied):
#   romanesca -> prinner (step 3->4)
#   do_re_mi -> fonte (step 1->7)
#   do_re_mi -> monte (step 1->7, or overlap at 2/7)
#   do_re_mi -> romanesca (identity 1->1)
#   do_re_mi -> sol_fa_mi (identity 1->1)
#   meyer -> fonte (step 1->7)
#   meyer -> sol_fa_mi (identity 1->1)
#   sol_fa_mi -> fonte (step 1->7)
#   fonte -> monte (step 1->7)
#   fonte -> sol_fa_mi (identity 1->1)
#   monte -> fonte (step 1->7)
#   monte -> sol_fa_mi (identity 1->1)
#   fenaroli -> prinner (step 3->4)
#   passo_indietro -> cadenza_composta (step 5->4)
#   passo_indietro -> cadenza_semplice (identity 5->5)
#   passo_indietro -> half_cadence (identity 5->5)
#   indugio -> cadenza_composta (identity 4->4)
#   indugio -> cadenza_semplice (step 4->5)
#   indugio -> half_cadence (step 4->5)
#   ponte -> cadenza_composta (step 5->4)
#   ponte -> cadenza_semplice (identity 5->5)
#   ponte -> prinner (step 5->4)
#   ponte -> sol_fa_mi (dominant 5->1)
#   half_cadence -> do_re_mi (dominant 5->1)
#   half_cadence -> romanesca (dominant 5->1)
#   half_cadence -> meyer (dominant 5->1)
#   cadenza_* -> opening schemas (identity 1->1)
#   comma -> fonte/monte (step 1->7)
#   comma -> romanesca (identity 1->1)
#   quiescenza -> opening schemas (identity 1->1)
#
# FREE PASSAGE required:
#   Most opening -> prinner (bass 1->4 = 3 steps)
#   Most schemas -> comma (bass ->5)
#   prinner -> pre-cadential (bass 1->4)
#
# ============================================================================

# ============================================================================
# GENRE SCHEMA PREFERENCES
# ============================================================================

genre_preferences:
  invention:
    opening: [romanesca, do_re_mi]
    continuation: [fonte, monte, fenaroli]
    cadential: [prinner, sol_fa_mi]
    texture: imitative

  minuet:
    opening: [do_re_mi, romanesca]
    continuation: [fonte]
    cadential: [prinner]
    texture: melody_bass

  gavotte:
    opening: [romanesca, do_re_mi]
    continuation: [fonte, monte]
    cadential: [prinner, sol_fa_mi]
    texture: melody_bass

# ============================================================================
# REFERENCES
# ============================================================================

references:
  - "Gjerdingen, Robert O. 2007. Music in the Galant Style. Oxford."
  - "Sanguinetti, Giorgio. 2012. The Art of Partimento. Oxford."
  - "Rabinovitch & Carter-Enyi. 2024. MTO 30.1."
