# Galante Schemas
# AUTHORITATIVE — derived from Gjerdingen (2007), Sanguinetti (2012), partimento pedagogy
#
# Notation:
#   soprano_degrees / bass_degrees: signed scale degrees indicating voice motion
#     First degree: unsigned (starting point)
#     Subsequent degrees: -N = down to N, N = same degree, +N = up to N
#   Degrees are relative to local key unless sequential: true
#
# Entry/exit derived from first/last degrees (absolute value).
#
# References:
#   - Gjerdingen, Robert O. Music in the Galant Style. Oxford, 2007.
#   - Sanguinetti, Giorgio. The Art of Partimento. Oxford, 2012.
#   - Open Music Theory: https://viva.pressbooks.pub/openmusictheory/

# =============================================================================
# OPENING SCHEMAS
# =============================================================================

do_re_mi:
  description: Opening gambit with stepwise soprano ascent
  soprano_degrees: ["1", "+2", "+3"]
  bass_degrees: ["1", "-7", "+1"]
  harmony: ["I", "V", "I"]
  bass_alt: [1, 5, 1]
  bars: [1, 2]
  position: opening
  figuration_profile: stepwise_ascent
  cadence_approach: false
  accompany_texture: pillar
  source: "Gjerdingen Ch.6"

romanesca:
  description: Six-stage opening with alternating strong/weak
  soprano_degrees: ["3", "+5", "-1", "+3", "+6", "-5"]
  bass_degrees: ["1", "-7", "-6", "-5", "-4", "-3"]
  harmony: ["I", "V", "vi", "III", "IV", "I"]
  bars: [2, 4]
  position: opening
  figuration_profile: stepwise_mixed
  cadence_approach: false
  accompany_texture: walking
  notes: "Almost always blends into following schema (often Prinner)"
  source: "Gjerdingen Ch.2, Figure 2.1"

meyer:
  description: Two dyads with accented dissonance on scale-degree 7
  soprano_degrees: ["1", "-7", "-4", "-3"]
  bass_degrees: ["1", "+2", "-7", "+1"]
  harmony: ["I", "V", "viio", "I"]
  structure: two_dyads
  bars: [1, 2]
  position: opening
  figuration_profile: stepwise_mixed
  cadence_approach: false
  accompany_texture: staggered
  source: "Gjerdingen Ch.9"

sol_fa_mi:
  description: Lyrical opening, less bold than Meyer
  soprano_degrees: ["5", "-4", "4", "-3"]
  bass_degrees: ["1", "+2", "-7", "+1"]
  harmony: ["I", "ii", "viio", "I"]
  structure: two_dyads
  bars: [1, 2]
  position: opening
  figuration_profile: stepwise_descent
  cadence_approach: false
  accompany_texture: staggered
  source: "Gjerdingen Ch.10"

# =============================================================================
# RIPOSTE SCHEMAS
# =============================================================================

prinner:
  description: Archetypal riposte; parallel tenths descending
  soprano_degrees: ["6", "-5", "-4", "-3"]
  bass_degrees: ["4", "-3", "-2", "-1"]
  harmony: ["IV", "I", "ii", "I"]
  bass_alt: [4, 3, 2, 5, 1]
  bars: [1, 2]
  position: riposte
  figuration_profile: stepwise_descent
  cadence_approach: true
  accompany_texture: pillar
  notes: "Optional 5 before final 1 strengthens cadential effect"
  source: "Gjerdingen Ch.3"

# =============================================================================
# CONTINUATION SCHEMAS (Sequential)
# =============================================================================

fonte:
  description: Descending sequence; clausula cantizans per segment
  segment:
    soprano_degrees: ["4", "-3"]
    bass_degrees: ["7", "+1"]
    harmony: ["V", "i"]
  segments: 2
  segment_direction: down
  direction: descending
  typical_keys: "ii -> I"
  bars: [2, 4]
  position: continuation
  sequential: true
  figuration_profile: sequence_descending
  cadence_approach: false
  accompany_texture: walking
  source: "Riepel (1755); Gjerdingen Ch.8"

monte:
  description: Ascending sequence; clausula cantizans per segment
  segment:
    soprano_degrees: ["4", "-3"]
    bass_degrees: ["7", "+1"]
    harmony: ["V", "I"]
  segments: [2, 3]
  segment_direction: up
  direction: ascending
  typical_keys: "IV -> V (-> vi)"
  bars: [2, 4]
  position: continuation
  sequential: true
  figuration_profile: sequence_ascending
  cadence_approach: false
  accompany_texture: walking
  notes: "Soprano less fixed than other schemas"
  source: "Riepel (1755); Gjerdingen Ch.7"

fenaroli:
  description: Interior schema; bass 7-1-2-3 with soprano 4-3-7-1
  soprano_degrees: ["4", "-3", "-7", "+1"]
  bass_degrees: ["7", "+1", "+2", "+3"]
  harmony: ["viio", "I", "ii", "I"]
  bars: [1, 2]
  position: continuation
  repeatable: true
  figuration_profile: galant_general
  cadence_approach: false
  accompany_texture: walking
  source: "Gjerdingen Ch.13"

# =============================================================================
# PRE-CADENTIAL SCHEMAS
# =============================================================================

ponte:
  description: Dominant pedal prolongation
  soprano_degrees: ["2", "2", "2"]
  bass_degrees: ["5", "5", "5"]
  harmony: ["V", "V", "V"]
  bars: [1, 2]
  position: pre_cadential
  pedal: dominant
  figuration_profile: repeated_tone
  cadence_approach: false
  accompany_texture: pillar
  source: "Riepel; Gjerdingen Ch.14"

passo_indietro:
  description: Pre-cadential approach; first two stages of Prinner
  soprano_degrees: ["6", "-5"]
  bass_degrees: ["4", "+5"]
  harmony: ["IV", "V"]
  bars: [1, 2]
  position: pre_cadential
  chromatic: true
  figuration_profile: stepwise_descent
  cadence_approach: true
  accompany_texture: pillar
  notes: "The raised 4 is ornamental (filled in by phrase writer), not a structural stage"
  source: "Gjerdingen Ch.15"

indugio:
  description: Pre-cadential delay; prolongs 4
  soprano_degrees: ["2", "-1", "-7"]
  bass_degrees: ["4", "4", "4"]
  harmony: ["IV", "IV", "IV"]
  bars: [1, 2]
  position: pre_cadential
  pedal: subdominant
  figuration_profile: repeated_tone
  cadence_approach: true
  accompany_texture: pillar
  notes: "Prolongs subdominant before resolving to cadence"
  source: "Gjerdingen Ch.16"

# =============================================================================
# CADENTIAL SCHEMAS
# =============================================================================

cadenza_semplice:
  description: Simple authentic cadence
  soprano_degrees: ["2", "-7", "+1"]
  bass_degrees: ["5", "5", "-1"]
  harmony: ["V", "V7", "I"]
  bars: [1, 1]
  cadence_type: authentic_internal
  position: cadential
  figuration_profile: galant_general
  cadence_approach: true
  accompany_texture: pillar
  source: "Partimento tradition"

cadenza_composta:
  description: Strong authentic cadence with IV-V-I
  soprano_degrees: ["4", "-3", "-2", "-1"]
  bass_degrees: ["4", "+5", "5", "-1"]
  harmony: ["IV", "V", "V7", "I"]
  bars: [1, 2]
  cadence_type: authentic_final
  position: cadential
  figuration_profile: stepwise_descent
  cadence_approach: true
  accompany_texture: pillar
  source: "Gjerdingen Ch.11"

comma:
  description: Brief cadential gesture
  soprano_degrees: ["4", "-3"]
  bass_degrees: ["5", "-1"]
  harmony: ["V", "I"]
  bars: [1, 1]
  cadence_type: comma
  position: cadential
  repeatable: true
  figuration_profile: galant_general
  cadence_approach: true
  accompany_texture: pillar
  source: "Gjerdingen"

half_cadence:
  description: Cadence on dominant
  soprano_degrees: ["2", "2"]
  bass_degrees: ["5", "5"]
  harmony: ["V", "V"]
  bars: [1, 1]
  cadence_type: half
  position: cadential
  figuration_profile: repeated_tone
  cadence_approach: true
  accompany_texture: pillar
  source: "Common practice"

# =============================================================================
# POST-CADENTIAL SCHEMAS
# =============================================================================

quiescenza:
  description: Tonic pedal with chromatic neighbour motion
  soprano_degrees: ["1", "-7", "-6", "+7", "+1"]
  bass_degrees: ["1", "1", "1", "1", "1"]
  harmony: ["I", "I", "I", "I", "I"]
  bars: [1, 2]
  position: post_cadential
  pedal: tonic
  chromatic: true
  figuration_profile: pedal
  cadence_approach: false
  accompany_texture: pillar
  notes: "Framing function; used to begin pieces or confirm cadences. -7 is flat 7."
  source: "Gjerdingen Ch.17"

# =============================================================================
# BASS CONTINUITY RULES
# =============================================================================
# Schema A can connect to schema B if:
#   1. Identity: exit.bass of A == entry.bass of B
#   2. Step: |exit.bass of A - entry.bass of B| == 1
#   3. Dominant: exit.bass of A == 5 and entry.bass of B == 1
# If none apply, free passage (counterpoint only) bridges the gap.
#
# For Monte/Fonte: (4,7) is passing motion; actual arrival is (3,1).
# Free passage targets local degree 1, not degree 7.
