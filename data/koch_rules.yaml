# Koch's Mechanical Rules Configuration
# Source: Heinrich Christoph Koch, Versuch einer Anleitung zur Composition (1782-1793)

# Phrase sequence constraints (hard blockers)
phrase_sequence:
  i_i_forbidden: true          # Koch's rule 35: Two I-phrases in succession forbidden
  v_v_same_key_forbidden: true # Koch's rule 36: Two V-phrases forbidden in same key
  vi_start_forbidden: true     # Koch's rule 37: V-phrase followed by I-phrase at composition start

# Phrase length preferences (soft constraints)
phrase_length:
  preferred: 4                 # Koch's rule 87: Four-measure phrases most common/pleasing
  allowed: [4, 5, 6, 7]        # Koch's rule 89-90: Allowed phrase lengths

# Period structure preferences (soft constraints)
period_structure:
  standard_bars: [8, 16, 24, 32]  # Koch's rule 22: Multiples of 8 preferred
  periods: 2                       # Koch's rule 24: Two periods typical

# Modulation rules for first cadence (soft constraints)
modulation:
  major_first_cadence: ["I", "V"]           # Koch's rule 30: Major mode options
  minor_first_cadence: ["i", "v", "III"]    # Koch's rule 30: Minor mode options

# Metrical stress (post-realisation guard)
metrical:
  max_tied_subdivisions: 2     # Koch's rule 14: Max consecutive tied subdivisions before bass required
