# CPE Bach Rules Configuration
# Source: C.P.E. Bach, Versuch über die wahre Art das Clavier zu spielen (1753/1762)

# Cadence rules (implemented)
cadence:
  fifth_in_soprano_forbidden: true  # §36: In a final cadence the fifth must never appear in upper voice

# Free fantasia rules (for future implementation)
free_fantasia:
  # §3: A key in which to begin and end must be established
  establish_key: true

  # §6: When only little time is available, don't wander into too remote keys
  remote_key_constraint:
    short_piece_max_distance: 2  # Max circle-of-fifths distance for short pieces
    long_piece_max_distance: 4  # Max for longer pieces

  # §12: A diversified figuration and all attributes of good performance must be employed
  require_figuration_diversity: true

# Appoggiatura rules (for future ornament system)
appoggiatura:
  # §11: Duration rules
  duple_time_duration: "half"      # Half of principal note in duple time
  triple_time_duration: "two_thirds"  # Two-thirds in triple time

  # §7: Must be held until released, smoothly joined
  require_legato: true

  # §9: In triple time, only on downbeat before relatively long note
  triple_time_downbeat_only: true

  # Execution: Louder than resolution
  louder_than_resolution: true

# Trill rules (for future ornament system)
trill:
  # §5: Always begins on tone above principal note (from upper note)
  start_from_upper: true

  # §8: Practice slowly, then rapidly but always evenly
  require_evenness: true

  # §15: Suffix must be played as rapidly as trill proper
  suffix_speed_matches_trill: true

  # §19: Neither trills nor suffixes allowed in augmented second interval
  augmented_second_forbidden: true

  # §23: Ascending trill requires long note
  ascending_requires_long_note: true

# Turn rules (for future ornament system)
turn:
  # §8: Don't insert turn just because of note length - consider affect and style
  affect_aware: true

  # Avoid in rapid descending passages and congested textures
  avoid_rapid_descending: true
  avoid_congested_texture: true

# Mordent rules (for future ornament system)
mordent:
  # §4: Seldom in descending leaps, never in descending seconds
  descending_leap_rare: true
  descending_second_forbidden: true

  # Especially appropriate on bass notes
  prefer_bass_notes: true

  # Use trill instead on long notes
  long_notes_use_trill: true

# Slow movement (adagio/andante) rules
slow_movement:
  # Touch: Broad, sustained, never sticky
  touch: "broad_sustained"

  # Ornaments: Sustain tone to conceal keyboard decay
  ornaments_sustain_tone: true

  # Character: Singing (cantabile), from the soul
  character: "cantabile"

  # Space: Fill empty gaps without excess
  fill_gaps: true
  avoid_excess: true

  # §23: Short notes after dotted ones are always shorter than notated
  dotted_shortening: true

# Expression rules
expression:
  # §8: Use embellishments sparingly, at correct places, without disturbing affect
  sparingly: true
  affect_aware: true

  # §10: Variety - caressing ornament, then brilliant one, or play directly as written
  require_variety: true

  # §19: More tones in ornament requires longer principal note
  ornament_length_proportional: true
