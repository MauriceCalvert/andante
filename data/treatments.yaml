# Treatments - voice expansion configuration
#
# Each treatment configures how soprano and bass voices are expanded.
# Parameters use prefix: soprano_* for soprano, bass_* for bass.
#
# Parameters:
#   {voice}_source      Material source for the voice
#                       Values: subject, counter_subject, sustained, pedal, schema, accompaniment
#                       Default: subject (for both soprano and bass)
#
#   {voice}_transform   Melodic transformation applied to source material
#                       Values: none, invert, retrograde, head, tail, augment, diminish
#                       Default: none
#
#   {voice}_transform_params  Parameters for transform (e.g., { size: 4 } for head/tail)
#                       Default: {}
#
#   {voice}_derivation  Post-transform derivation
#                       Values: null, imitation
#                       Default: null
#
#   {voice}_derivation_params  Parameters for derivation (e.g., { interval: 4 })
#                       Default: {}
#
#   {voice}_delay       Entry delay in bars (creates rest before voice enters)
#                       Values: fraction like 1/4, 1/2, 1
#                       Default: 0
#
#   {voice}_direct      If true, use source material directly without bar treatment cycling
#                       Default: false
#
# Special parameters:
#   pedal_type          For pedal treatments: tonic, dominant
#   swap_at             For voice_exchange: when voices swap material (fraction of phrase)
#   schema              For schema treatment: schema name (e.g., romanesca)

augmentation:
  # Augmentation: double note values (slower)
  soprano_transform: augment
  bass_source: counter_subject
  interdictions: [ornaments]  # preserve augmented durations

bass_development:
  soprano_source: sustained
  bass_source: counter_subject

bass_sequence:
  soprano_source: sustained
  bass_source: subject
  bass_transform: head
  bass_transform_params: { size: 4 }

bass_statement:
  soprano_source: sustained
  bass_source: subject

dialogue:
  soprano_source: subject
  bass_source: subject
  bass_transform: augment
  bass_delay: 1

dialogue_invert:
  soprano_source: subject
  bass_source: subject
  bass_transform: invert
  bass_delay: 1

diminution:
  # Diminution: halve note values (faster)
  soprano_transform: diminish
  soprano_transform_params: { min_duration: 1/16 }
  bass_source: counter_subject
  interdictions: [ornaments]  # preserve diminished durations

fragmentation:
  soprano_transform: head
  soprano_transform_params: { size: 4 }
  bass_delay: 1/8

head_sequence:
  soprano_transform: head
  soprano_transform_params: { size: 4 }
  bass_delay: 1/8

imitation:
  # Imitation: bass imitates subject at the fifth below (interval -4 = fifth below)
  soprano_source: subject
  bass_source: subject
  bass_transform: none
  bass_derivation: imitation
  bass_derivation_params: { interval: -4 }
  bass_delay: 1

imitation_cs:
  # Soprano plays counter_subject, bass plays subject
  soprano_source: counter_subject
  bass_source: subject

inversion:
  # Inversion: soprano inverts subject, bass plays counter_subject
  soprano_transform: invert
  bass_source: counter_subject

melody_accompaniment:
  soprano_source: subject
  bass_source: accompaniment

repose:
  soprano_transform: augment
  bass_delay: 1/2

retrograde:
  # Retrograde: subject played backwards
  soprano_transform: retrograde
  bass_source: counter_subject

schema:
  soprano_source: schema
  bass_source: schema

sequence:
  bass_transform: augment
  bass_delay: 1/4

statement:
  # Statement: subject in soprano, counter_subject in bass
  soprano_direct: true
  bass_source: counter_subject
  interdictions: [inner_voice_gen]

stretto:
  # Stretto: tight overlapping entries (bass enters before soprano finishes)
  soprano_source: subject
  bass_source: subject
  bass_derivation: imitation
  bass_derivation_params: { interval: -4 }
  interdictions: [ornaments]  # preserve subject rhythm for recognizable overlap
  bass_delay: 1/4

voice_exchange:
  soprano_source: subject
  bass_source: counter_subject
  swap_at: 1/2

tail_development:
  soprano_transform: tail
  soprano_transform_params: { size: 4 }
  bass_delay: 1/8

hold:
  soprano_source: sustained
  bass_source: sustained

pedal_tonic:
  pedal_type: tonic
  bass_source: pedal
  interdictions:
    - inner_voice_gen      # Bass is fixed pedal

pedal_dominant:
  pedal_type: dominant
  bass_source: pedal
  interdictions:
    - inner_voice_gen      # Bass is fixed pedal