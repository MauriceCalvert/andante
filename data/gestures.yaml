# Rhetorical gestures: note-level effects triggered by phrase context
# position: where in phrase (first, last, downbeats, upbeats, all)
# articulation: which articulation to apply at that position

answer:
  effects:
    - position: first
      articulation: legato
    - position: last
      articulation: accent

drive:
  effects:
    - position: downbeats
      articulation: accent
    - position: upbeats
      articulation: staccato

question:
  effects:
    - position: last
      articulation: staccato
    - position: all
      articulation: legato

rest:
  effects:
    - position: last
      articulation: staccato
    - position: all
      articulation: legato

statement_open:
  effects:
    - position: first
      articulation: accent
    - position: downbeats
      articulation: legato

surprise:
  effects:
    - position: first
      articulation: accent
    - position: all
      articulation: staccato