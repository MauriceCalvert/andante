# Cadence Definitions
# ===================
# Cadence identity, harmony, and transition rules.
# Voice-leading templates live in cadences/templates.yaml (L017).
#
# Sections:
#   types          - Cadence type definitions with finality and schema mappings
#   roman_numerals - Simple chord progressions (for phrase harmony)
#   transitions    - Cadence type lookup by key area transition
#
# Degrees are relative to tonal target (offset applied at runtime)

# ============================================================================
# CADENCE TYPES - Identity, finality, and schema mappings
# ============================================================================
# Each type defines: harmonic identity, which schema(s) realise it, and
# whether it can end a piece. The cadence type carries finality — a
# semplice and composta are different types of authentic cadence.

types:
  authentic_internal:
    roman_numerals: [V, I]
    schemas: [cadenza_semplice]
    final: false
  authentic_final:
    roman_numerals: [V, I]
    schemas: [cadenza_composta]
    final: true
  half:
    roman_numerals: [V]
    schemas: [half_cadence]
    final: false
  comma:
    roman_numerals: [V, I]
    schemas: [comma]
    final: true
  deceptive:
    roman_numerals: [V, vi]
    schemas: []
    final: false
  plagal:
    roman_numerals: [IV, I]
    schemas: []
    final: false
  phrygian:
    roman_numerals: [iv, V]
    schemas: []
    final: false

# ============================================================================
# ROMAN NUMERALS - Chord progressions for phrase harmony generation
# ============================================================================

roman_numerals:
  authentic: [V, I]
  half: [V]
  deceptive: [V, vi]
  plagal: [IV, I]
  imperfect: [V, I]
  phrygian: [iv, V]
  "null": []

# ============================================================================
# TRANSITIONS - Cadence type lookup by key area transition
# ============================================================================
# Format: from_area_to_area: cadence_type
# Used by cadence_planner to determine cadence types at tonal section boundaries

transitions:
  major:
    I_to_V: half
    V_to_I: authentic
    I_to_vi: deceptive
    I_to_IV: half
    vi_to_I: authentic
    IV_to_I: plagal
    ii_to_V: half
    V_to_vi: deceptive
    _default: half

  minor:
    i_to_III: half
    III_to_i: authentic
    i_to_v: half
    i_to_V: half
    v_to_i: authentic
    V_to_i: authentic
    III_to_v: half
    III_to_V: half
    iv_to_i: plagal
    i_to_iv: half
    _default: half
