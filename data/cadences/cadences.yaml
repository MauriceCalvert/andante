# Cadence Definitions
# ===================
# Single source of truth for all cadence-related data.
#
# Sections:
#   types          - Cadence type definitions with finality and schema mappings
#   roman_numerals - Simple chord progressions (for phrase harmony)
#   internal       - Half-bar formulas with voice-leading (mid-piece)
#   final          - Two-bar formulas with approach + resolution
#   transitions    - Cadence type lookup by key area transition
#
# Voice roles (not SATB names):
#   top     - highest voice (track 0)
#   inner_1 - first inner voice (track 1 when 3+ voices)
#   inner_2 - second inner voice (track 2 when 4 voices)
#   bottom  - lowest voice (track N-1)
#
# Degrees are relative to tonal target (offset applied at runtime)

# ============================================================================
# CADENCE TYPES - Identity, finality, and schema mappings
# ============================================================================
# Each type defines: harmonic identity, which schema(s) realise it, and
# whether it can end a piece. The cadence type carries finality — a
# semplice and composta are different types of authentic cadence.

types:
  authentic_internal:
    roman_numerals: [V, I]
    schemas: [cadenza_semplice]
    final: false
  authentic_final:
    roman_numerals: [V, I]
    schemas: [cadenza_composta]
    final: true
  half:
    roman_numerals: [V]
    schemas: [half_cadence]
    final: false
  comma:
    roman_numerals: [V, I]
    schemas: [comma]
    final: true
  deceptive:
    roman_numerals: [V, vi]
    schemas: []
    final: false
  plagal:
    roman_numerals: [IV, I]
    schemas: []
    final: false
  phrygian:
    roman_numerals: [iv, V]
    schemas: []
    final: false

# ============================================================================
# ROMAN NUMERALS - Chord progressions for phrase harmony generation
# ============================================================================

roman_numerals:
  authentic: [V, I]
  half: [V]
  deceptive: [V, vi]
  plagal: [IV, I]
  imperfect: [V, I]
  phrygian: [iv, V]
  "null": []

# ============================================================================
# INTERNAL CADENCES - Half-bar, used mid-piece
# ============================================================================
# Inner voices move stepwise to chord tones for proper voice leading

internal:
  authentic:
    top: [7, 1]
    inner_1: [2, 3]
    inner_2: [5, 5]
    bottom: [5, 1]
  half:
    top: [1, 7]
    inner_1: [5, 4]
    inner_2: [3, 2]
    bottom: [4, 5]
  deceptive:
    top: [7, 1]
    inner_1: [2, 1]
    inner_2: [5, 6]
    bottom: [5, 6]
  plagal:
    top: [4, 3]
    inner_1: [6, 5]
    inner_2: [1, 1]
    bottom: [4, 1]
  phrygian:
    top: [3, 2]
    inner_1: [6, 7]
    inner_2: [4, 4]
    bottom: [6, 5]

# ============================================================================
# FINAL CADENCES - Two-bar: approach + resolution
# ============================================================================
# Inner voices follow standard voice leading: stepwise motion, resolve dissonances

final:
  stepwise:
    approach:
      top: [3, 2]
      inner_1: [1, 7]
      inner_2: [5, 5]
      bottom: [4, 5]
      durations: [1/2, 1/2]
    resolution:
      top: [7, 1]
      inner_1: [2, 3]
      inner_2: [5, 5]
      bottom: [5, 1]
      durations: [1/4, 3/4]
  leap:
    approach:
      top: [5, 2]
      inner_1: [1, 7]
      inner_2: [3, 5]
      bottom: [3, 5]
      durations: [1/2, 1/2]
    resolution:
      top: [7, 1]
      inner_1: [2, 3]
      inner_2: [5, 5]
      bottom: [5, 1]
      durations: [1/4, 3/4]
  decorated:
    approach:
      top: [4, 3, 2]
      inner_1: [6, 5, 7]
      inner_2: [1, 1, 5]
      bottom: [4, 4, 5]
      durations: [1/4, 1/4, 1/2]
    resolution:
      top: [7, 1]
      inner_1: [2, 3]
      inner_2: [5, 5]
      bottom: [5, 1]
      durations: [1/4, 3/4]
  invention:
    approach:
      top: [3, 2, 7, 1, 2]
      inner_1: [1, 7, 5, 5, 7]
      inner_2: [5, 5, 2, 3, 5]
      bottom: [1, 7, 5, 4, 5]
      durations: [1/8, 1/8, 1/8, 1/8, 1/2]
    resolution:
      top: [7, 1]
      inner_1: [2, 3]
      inner_2: [5, 5]
      bottom: [5, 1]
      durations: [1/4, 3/4]

# ============================================================================
# TRANSITIONS - Cadence type lookup by key area transition
# ============================================================================
# Format: from_area_to_area: cadence_type
# Used by cadence_planner to determine cadence types at tonal section boundaries

transitions:
  major:
    I_to_V: half
    V_to_I: authentic
    I_to_vi: deceptive
    I_to_IV: half
    vi_to_I: authentic
    IV_to_I: plagal
    ii_to_V: half
    V_to_vi: deceptive
    _default: half

  minor:
    i_to_III: half
    III_to_i: authentic
    i_to_v: half
    i_to_V: half
    v_to_i: authentic
    V_to_i: authentic
    III_to_v: half
    III_to_V: half
    iv_to_i: plagal
    i_to_iv: half
    _default: half
