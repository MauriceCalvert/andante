# =============================================================================
# HEMIOLA TEMPLATES (for bars 6-7 in 3/4)
# =============================================================================

hemiola:
  "3/4":
    # Hemiola spans 2 bars: 6 beats become 2+1+2+1 grouping
    4:
      standard:
        durations: [2, 1, 2, 1]  # creates 2:3 against regular metre
    6:
      standard:
        durations: [1, 1, 1, 1, 1, 1]  # even distribution for subtle hemiola
