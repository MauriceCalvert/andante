# Rhythm Templates - Duration patterns for figure realisation
#
# Each (note_count, metre) has a list of named patterns.
# Durations are in beats (not whole notes).
# For 3/4: bar = 3 beats.  For 4/4: bar = 4 beats.
#
# characters: [] = all characters.  Restrict with [plain, expressive, ...].
# positions:  [] = all positions.   Restrict with [passing, cadential, schema_arrival].
# weight: selection priority (higher = preferred). Must be > 0.
#
# Selection: filter by character + position, then deterministic rotation by bar_num.
# S001: performance practice (overdotting, inequality) is out of scope.
#
# Beat values must scale to valid durations (L006).  Valid beat values:
# 1/4, 1/2, 3/4, 1, 3/2, 2, 3 (scale factor 1/4 for standard bar gaps).

# =============================================================================
# 3/4 METRE TEMPLATES  (bar = 3 beats)
# =============================================================================

"3/4":
  2:
    - name: half_quarter
      durations: [2, 1]
      characters: []
      positions: []
      weight: 1.0

    - name: two_dotted_quarters
      durations: [3/2, 3/2]
      characters: [expressive, ornate]
      positions: [passing, schema_arrival]
      weight: 0.7

    - name: cadential_close
      durations: [1, 2]
      characters: []
      positions: [cadential]
      weight: 0.9

  3:
    - name: even_quarters
      durations: [1, 1, 1]
