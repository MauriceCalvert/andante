# Diminution Table - Interval-indexed baroque figure vocabulary
# Based on Quantz (Versuch, 1752) and CPE Bach (Versuch, 1753)
#
# Indexed by interval between consecutive anchors.
# Degrees are relative to starting pitch; final degree equals the interval.
#
# Fields:
#   name: unique identifier
#   degrees: scale degree offsets from start (0=start, final=interval)
#   contour: descriptive shape name
#   polarity: upper | lower | balanced (where ornamentation occurs)
#   arrival: direct | stepwise | accented (how we reach target)
#   placement: start | end | span (where figure fits in gap)
#   character: plain | expressive | energetic | ornate | bold
#   harmonic_tension: low | medium | high
#   max_density: low | medium | high (rhythmic ceiling)
#   cadential_safe: true if usable near phrase endings
#   repeatable: true if suitable for sequences
#   requires_compensation: true if generates leap needing recovery
#   compensation_direction: up | down | null
#   is_compound: true if implies two-voice texture
#   minor_safe: true if works with melodic minor inflections
#   requires_leading_tone: true if needs raised 7 in minor
#   weight: selection probability (historical frequency)

unison:
  - name: repeated_tone
    degrees: [0, 0]
    contour: static
    polarity: balanced
    arrival: direct
    placement: span
    character: plain
    harmonic_tension: low
    max_density: low
    cadential_safe: true
    repeatable: true
    requires_compensation: false
    compensation_direction: null
    is_compound: false
    minor_safe: true
    requires_leading_tone: false
    weight: 1.0

  - name: mordent_static
    degrees: [0, -1, 0]
    contour: lower_neighbor
    polarity: lower
    arrival: direct
    placement: start
    character: expressive
    harmonic_tension: low
    max_density: medium
    cadential_safe: true
    repeatable: true
    requires_compensation: false
    compensation_direction: null
    is_compound: false
    minor_safe: true
    requires_leading_tone: false
    weight: 0.9

  - name: turn_static
    degrees: [0, 1, 0, -1, 0]
    contour: turn
    polarity: balanced
    arrival: direct
    placement: span
