    harmonic_tension: low
    max_density: high
    cadential_safe: true
    repeatable: true
    requires_compensation: false
    compensation_direction: null
    is_compound: false
    minor_safe: true
    requires_leading_tone: false
    weight: 0.7
    chainable: false

