# Violin playability constraints
# See: docs/Tier2_Architecture/playability.md

name: violin

actuators:
  - name: bow
    range: [55, 91]
    max_simultaneous: 2
    max_leap: 12
    reach:
      method: strings
      strings:
        G: 55
        D: 62
        A: 69
        E: 76
      max_position: 10
      finger_reach: [0, 2, 3, 5]
      combinable: [[G, D], [D, A], [A, E]]
      max_gap: 1
