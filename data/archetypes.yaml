    - [0.50, 0.75]      # Slight easing
    - [0.70, 0.6]       # Acceptance begins
    - [0.85, 0.4]       # Peace emerges
    - [1.00, 0.3]       # Quiet resolution
  climax_position: 0.35
  key_scheme_minor:
    exordium: i
    narratio: iv
    confutatio: VI
    confirmatio: V
    peroratio: i
  key_scheme_major:
    exordium: I
    narratio: vi
    confutatio: ii
    confirmatio: V
    peroratio: I
  compatible_affects:
    - Klage
    - Sehnsucht

