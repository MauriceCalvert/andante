# Dramaturgical Archetypes
# Based on baroque rhetorical structure (dispositio) and affect theory
#
# Each archetype defines:
# - rhetorical_sections: proportions of classical oration parts
# - tension_curve: points defining dramatic shape [position, level]
# - key_schemes: tonal paths for minor and major modes
# - compatible_affects: which affects this archetype suits

struggle_to_triumph:
  description: "Heroic narrative - from conflict through adversity to victory"
  rhetorical_sections:
    exordium: 0.10      # Brief, tense opening
    narratio: 0.20      # Establish conflict
    confutatio: 0.35    # Extended struggle, confrontation
    confirmatio: 0.25   # Victory emerges, resolution builds
    peroratio: 0.10     # Triumphant conclusion
  tension_curve:
    - [0.00, 0.5]       # Start with tension
    - [0.10, 0.6]       # Rising
    - [0.30, 0.7]       # Building
    - [0.50, 0.85]      # Struggle peaks
    - [0.70, 0.95]      # Climax
    - [0.85, 0.7]       # Resolution
    - [1.00, 0.4]       # Triumph, release
  climax_position: 0.70
  key_scheme_minor:
    exordium: i
    narratio: III
    confutatio: iv
    confirmatio: V
    peroratio: i
  key_scheme_major:
    exordium: I
    narratio: vi
    confutatio: IV
    confirmatio: V
    peroratio: I
  compatible_affects:
    - Entschlossenheit
    - Zorn
    - Majestaet

