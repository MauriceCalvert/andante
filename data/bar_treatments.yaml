# Bar treatments for phrase concatenation
# Each bar in a phrase uses a different treatment
# Cycle guarantees no consecutive repeats

treatments:
  - name: continuation
    transform: none
    shift: -3
  - name: development
    transform: head
    shift: -1
  - name: fragmentation
    transform: tail
    shift: -1
  - name: inversion_seq
    transform: invert
    shift: -2
  - name: response
    transform: invert
    shift: 0
  - name: retrograde
    transform: retrograde
    shift: 0
  - name: sequence_down
    transform: none
    shift: -2
  - name: statement
    transform: none
    shift: 0