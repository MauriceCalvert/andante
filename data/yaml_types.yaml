# YAML Type Definitions
# =====================
# Declares cross-file type references in data/*.yaml files.
#
# NOTE: This file defines a *validation schema* for YAML cross-references.
# It is NOT related to musical "galante schemas" (do_re_mi, prinner, etc.)
# which are defined in data/schemas.yaml.
#
# Format:
#   type_key:
#     file: path/to/actual.yaml   # Path relative to data/ directory
#     defines: type_name          # Keys at this path define the type
#     references:
#       path.to.field: type_name  # Values at this path must exist in type_name
#
# Path syntax:
#   - "keys" means the dictionary keys at that level
#   - "foo.keys" means the dictionary keys nested under 'foo'
#   - "*.field" means field in all dict children
#   - "[*]" means all array elements

affects:
  file: rhetoric/affects.yaml
  defines: affect
  path: affects.keys

cadences:
  file: cadences/cadences.yaml
  defines: cadence
  path: types.keys

episodes:
  file: rhetoric/episodes.yaml
  defines: episode
  path: episodes.keys

figurations:
  file: figuration/figurations.yaml
  defines: figuration
  path: keys
  references:
    "*.triggers[*]": episode

genres:
  path: "genres/*.yaml"
  references:
    "sections[*].final_cadence": cadence
    "sections[*].episodes[*]": episode

textures:
  file: voicing/textures.yaml
  defines: texture
  path: keys
