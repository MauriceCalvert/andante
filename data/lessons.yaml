bar_duplication:
  id: var_001
  severity: major
  scope: piece
  description: Consecutive bars with identical pitch content

endless_trill:
  id: orn_001
  severity: blocker
  scope: piece
  description: Trill without resolution

parallel_fifths:
  id: tex_001
  severity: blocker
  scope: phrase
  description: Parallel perfect fifths between voices

parallel_octaves:
  id: tex_002
  severity: blocker
  scope: phrase
  description: Parallel octaves between voices

parallel_rhythm:
  id: tex_003
  severity: major
  scope: piece
  description: Identical rhythm in soprano and bass

sequence_duplication:
  id: var_002
  severity: major
  scope: piece
  description: Repeated pitch sequence

metrical_stress:
  id: koch_001
  severity: major
  scope: piece
  description: Bass fails to maintain metrical stress during soprano rest (Koch's rule 13-14)

# Phase 1: Voice-Leading Hard Constraints
direct_fifth:
  id: vl_003
  severity: blocker
  scope: phrase
  description: Hidden fifth - similar motion to fifth with soprano leap (Fux I.15)

direct_octave:
  id: vl_004
  severity: blocker
  scope: phrase
  description: Hidden octave - similar motion to octave with soprano leap (Fux I.15)

voice_overlap:
  id: vl_005
  severity: blocker
  scope: phrase
  description: Voice crosses previous position of adjacent voice (Kirnberger II.5)

dissonance_unprepared:
  id: diss_001
  severity: blocker
  scope: phrase
  description: Dissonance on strong beat without preparation (Fux II.1)

dissonance_unresolved:
  id: diss_002
  severity: blocker
  scope: phrase
  description: Dissonance not resolved by step to consonance (Fux II.2)

dissonance_resolved_up:
  id: diss_003
  severity: blocker
  scope: phrase
  description: Dissonance resolved upward (except leading tone) (Fux II.3)

dissonance_by_leap:
  id: diss_004
  severity: blocker
  scope: phrase
  description: Weak-beat dissonance not passing/neighbor/anticipation (Fux II.2)

# Phase 2: Melodic Constraints (penalties, not blockers)
leap_not_compensated:
  id: mel_001
  severity: penalty
  scope: phrase
  cost: 10
  description: Leap not followed by contrary stepwise motion (Fux I.11)

consecutive_leaps_same_direction:
  id: mel_002
  severity: penalty
  scope: phrase
  cost: 15
  description: Two leaps in the same direction (Fux I.11)

tritone_outline:
  id: mel_003
  severity: penalty
  scope: phrase
  cost: 20
  description: Tritone outlined in melodic line within 4 notes (Fux I.10)

leap_augmented:
  id: mel_004
  severity: penalty
  scope: phrase
  cost: 30
  description: Melodic augmented interval (Fux I.10)

leap_seventh:
  id: mel_005
  severity: penalty
  scope: phrase
  cost: 25
  description: Melodic seventh (Fux I.10)

leap_beyond_octave:
  id: mel_006
  severity: penalty
  scope: phrase
  cost: 30
  description: Melodic leap larger than octave (Fux I.10)

# Phase 5: Cadence Validation
leading_tone_unresolved:
  id: cad_001
  severity: blocker
  scope: phrase
  description: Leading tone does not resolve to tonic (Fux III.2)

leading_tone_resolved_down:
  id: cad_002
  severity: blocker
  scope: phrase
  description: Leading tone resolves downward instead of upward (Fux III.2)

cadence_bass_motion:
  id: cad_003
  severity: blocker
  scope: phrase
  description: Bass motion does not match cadence type

cadence_preparation_weak:
  id: cad_004
  severity: major
  scope: phrase
  description: Cadence preparation not on strong beat