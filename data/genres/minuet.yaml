# Minuet (GenreTemplate format)
# Elegant binary dance in 3/4

name: minuet
voices: 2
form: binary
metre: 3/4
rhythmic_unit: "1/4"
texture: homophonic

# Voice tessituras
tessitura:
  soprano: 71      # B4 - median
  bass: 50         # D3 - median

# Schema selection by formal position
schema_preferences:
  opening:
    - do_re_mi
  riposte:
    - prinner
  continuation:
    - monte
  pre_cadential:
    - indugio
  cadential:
    - cadenza_semplice

# Cadence planning rules
cadence_template:
  density: medium
  first_cadence_bar: 8
  first_cadence_type: half
  section_end_type: authentic
  final_type: authentic

# Section structure (binary form)
sections:
  - name: A
    bars: [1, 8]
    key_area: I
    schema_sequence: [do_re_mi, prinner]
    end_cadence: half
  - name: B
    bars: [9, 16]
    key_area: V
    schema_sequence: [monte, cadenza_semplice]
    end_cadence: authentic

# Subject constraints
subject_constraints:
  min_notes: 4
  max_notes: 8
  max_bars: 2
  require_invertible: false
  require_answerable: false
  first_degree: [1, 3, 5]
  last_degree: [1, 2, 3, 5]

# Rhythmic vocabulary
rhythmic_vocabulary:
  primary: "1/4"
  characteristic_figures:
    - dotted_crotchet_quaver
    - crotchet_two_quavers
  tempo_range: [100, 120]

# Treatment vocabulary
treatments:
  required: [melody_accompaniment]
  optional: []
  opening: melody_accompaniment
  answer: melody_accompaniment

# Bass pattern: oom-pah-pah
bass_pattern: oom_pah_pah
