# Minuet (GenreTemplate format)
# Stately triple-metre dance in binary form

name: Minuet
voices: 2
form: binary
metre: 3/4
texture: melody_bass

# Schema selection by formal position
schema_preferences:
  opening:
    - do_re_mi
    - romanesca
  riposte:
    - prinner
  continuation:
    - fonte
  pre_cadential:
    - indugio
  cadential:
    - prinner
    - sol_fa_mi

# Cadence planning rules
cadence_template:
  density: low               # Every 8+ bars
  first_cadence_bar: 8       # Typical first cadence location
  first_cadence_type: half   # Usually half cadence
  section_end_type: half     # At section boundary
  final_type: authentic      # Piece ends PAC on I

# Section structure (binary form with repeats)
sections:
  - label: A
    key_area: I
    proportion: 0.5
    end_cadence: half
  - label: B
    key_area: V
    proportion: 0.5
    end_cadence: authentic

# Subject constraints for validation and derivation
subject_constraints:
  min_notes: 3
  max_notes: 8
  max_bars: 2
  require_invertible: false  # Dance melodies less strict
  require_answerable: false
  first_degree: [1, 3, 5]
  last_degree: [1, 2, 3, 5]

# Treatment vocabulary
treatments:
  required: [statement]
  optional: [transposition]
  opening: statement
  answer: statement
