voices: 2
metre: 4/4
upbeat: 1/4
form: binary
arc: dance_contrast
min_cs_duration: 1/8
bass_source: accompaniment

# Schema-first planning configuration (planner_design.md)
schema_preferences:
  opening: [do_re_mi, romanesca]
  continuation: [fonte, monte]
  cadential: [prinner]

cadence_template:
  density: medium  # Every 4-8 bars
  section_end: half
  final: authentic
  allow_phrygian: false

texture: melody_bass

subject_rhythm:
  pattern: [1/4, 1/8, 1/8, 1/8, 1/8]
  style: motoric

sections:
  - label: A
    tonal_path: [I, V]
    final_cadence: authentic
    bars_per_phrase: 4
  - label: B
    tonal_path: [V, ii, I]
    final_cadence: authentic
    bars_per_phrase: 4
