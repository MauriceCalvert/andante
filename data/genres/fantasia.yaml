# Fantasia (GenreTemplate format)
# Free-form imitative piece with mixed character

name: Fantasia
voices: 2
form: through_composed
metre: 4/4
texture: imitative

# Schema selection by formal position
schema_preferences:
  opening:
    - romanesca
    - do_re_mi
    - meyer
  riposte:
    - prinner
  continuation:
    - fonte
    - monte
    - fenaroli
  pre_cadential:
    - indugio
    - ponte
  cadential:
    - prinner
    - sol_fa_mi

# Cadence planning rules
cadence_template:
  density: medium            # Every 4-8 bars
  first_cadence_bar: 4       # Typical first cadence location
  first_cadence_type: half
  section_end_type: half
  final_type: authentic

# Section structure (through-composed, single section)
sections:
  - label: A
    key_area: I
    proportion: 1.0
    end_cadence: authentic

# Subject constraints for validation and derivation
subject_constraints:
  min_notes: 4
  max_notes: 16
  max_bars: 2
  require_invertible: true
  require_answerable: true
  first_degree: [1, 3, 5]
  last_degree: [2, 3, 5, 7]

# Treatment vocabulary
treatments:
  required: [statement, imitation]
  optional: [transposition, inversion, stretto]
  opening: statement
  answer: imitation
