# Trio Sonata
# Three-voice imitative dialogue (two upper + continuo)

name: trio_sonata
voices: 3
form: binary
metre: "4/4"
rhythmic_unit: "1/8"
imitation: mandatory
bass_treatment: contrapuntal

sections:
  - name: A
    schema_sequence: [romanesca, prinner]
  - name: B
    schema_sequence: [fonte, cadenza_semplice]

rhythmic_vocabulary:
  primary: "1/8"
  tempo_range: [66, 84]

subject_constraints:
  min_notes: 4
  max_notes: 12
  max_bars: 2
  require_invertible: true
  require_answerable: true
  first_degree: [1, 3, 5]
  last_degree: [2, 3, 5, 7]

treatments:
  required: [statement, imitation]
  optional: [transposition, inversion]
  opening: statement
  answer: imitation
