# Trio Sonata
# Three-voice imitative dialogue (two upper + continuo)

name: trio_sonata
voices: 3
form: binary
metre: "4/4"
rhythmic_unit: "1/8"
tempo: 75
bass_treatment: contrapuntal

sections:
  - name: A
    character: expressive
    schema_sequence: [romanesca, prinner]
  - name: B
    character: energetic
    schema_sequence: [fonte, fenaroli, passo_indietro, cadenza_semplice]
