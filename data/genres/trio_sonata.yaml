# Trio Sonata
# Three-voice imitative dialogue (two upper + continuo)

name: trio_sonata
voices: 3
form: binary
metre: "4/4"
rhythmic_unit: "1/8"
tempo: 75
tension: arch
bass_treatment: contrapuntal

sections:
  - name: A
    character: plain
    schema_sequence: [romanesca, prinner]
    accompany_texture: walking
  - name: B
    character: expressive
    schema_sequence: [fonte, fenaroli, passo_indietro, cadenza_composta]
    accompany_texture: walking
