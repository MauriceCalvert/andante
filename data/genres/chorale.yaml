# Chorale
# Hymn-style homophonic texture with phrase-based cadences

name: chorale
voices: 4
form: strophic
metre: "4/4"
rhythmic_unit: "1/4"
imitation: none
bass_treatment: contrapuntal

sections:
  - name: A
    schema_sequence: [do_re_mi, prinner]
  - name: B
    schema_sequence: [fonte, cadenza_semplice]

rhythmic_vocabulary:
  primary: "1/4"
  tempo_range: [60, 76]

subject_constraints:
  min_notes: 4
  max_notes: 12
  max_bars: 2
  require_invertible: false
  require_answerable: false
  first_degree: [1, 3, 5]
  last_degree: [1, 2, 3, 5]

treatments:
  required: [statement]
  optional: []
  opening: statement
  answer: statement
