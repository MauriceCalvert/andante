# Chorale (GenreTemplate format)
# Hymn-style homophonic texture with phrase-based cadences

name: Chorale
voices: 4
form: strophic
metre: 4/4
rhythmic_unit: "1/4"
texture: homophonic

# Schema selection by formal position
schema_preferences:
  opening:
    - do_re_mi
  riposte:
    - prinner
  continuation:
    - fenaroli
  pre_cadential:
    - indugio
  cadential:
    - prinner
    - sol_fa_mi

# Cadence planning rules
cadence_template:
  density: high              # Every 2-4 bars (phrase-end cadences)
  first_cadence_bar: 2       # Cadence at end of first phrase
  first_cadence_type: half
  section_end_type: authentic
  final_type: authentic

# Section structure (binary form)
# TODO: support proportion as alternative to explicit bars
sections:
  - name: A
    bars: [1, 4]
    key_area: I
    schema_sequence: [do_re_mi, prinner]
    end_cadence: half
  - name: B
    bars: [5, 8]
    key_area: I
    schema_sequence: [fonte, cadenza_semplice]
    end_cadence: authentic

# Subject constraints for validation and derivation
subject_constraints:
  min_notes: 4
  max_notes: 12
  max_bars: 2
  require_invertible: false   # Chorale melodies are pre-existing
  require_answerable: false
  first_degree: [1, 3, 5]
  last_degree: [1, 2, 3, 5]

# Treatment vocabulary
treatments:
  required: [statement]
  optional: []
  opening: statement
  answer: statement
