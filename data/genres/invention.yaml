# Two-Part Invention
# Bach-style two-voice imitative counterpoint
# Single source of truth for both planner and builder (L017)

name: invention
voices: 2
form: through_composed
metre: "4/4"
primary_value: "1/16"
imitation: mandatory
texture: imitative

# Voice tessituras: median pitch for each voice (per L003 - no range constraints)
tessitura:
  soprano: 70  # Bb4 - gravity centre (midpoint of typical 60-79 range)
  bass: 48     # C3 - gravity centre (midpoint of typical 36-60 range)

# Tonal journey: key area proportions through the piece
tonal_journey:
  major:
    - {proportion: 0.35, area: I, relationship: tonic}
    - {proportion: 0.30, area: V, relationship: dominant}
    - {proportion: 0.35, area: I, relationship: tonic}
  minor:
    - {proportion: 0.35, area: i, relationship: tonic}
    - {proportion: 0.30, area: III, relationship: relative}
    - {proportion: 0.35, area: i, relationship: tonic}

# Schema selection by formal position
schema_preferences:
  opening: [romanesca, do_re_mi]
  riposte: [prinner]
  continuation: [fonte, monte, fenaroli]
  pre_cadential: [indugio, ponte]
  cadential: [prinner, sol_fa_mi]

# Cadence planning rules
cadence_template:
  density: high
  first_cadence_bar: 4
  first_cadence_type: half
  section_end_type: half
  final_type: authentic

# Section structure with bar allocations
sections:
  - name: exordium
    label: A
    bars: [1, 4]
    key_area: I
    schema_sequence: [do_re_mi, do_re_mi]
    texture: imitative
    end_cadence: half
  - name: narratio
    bars: [5, 12]
    key_area: V
    schema_sequence: [episode, monte, monte, monte]
    texture: free
  - name: confirmatio
    bars: [13, 16]
    key_area: I
    schema_sequence: [prinner]
    texture: schematic
  - name: peroratio
    label: B
    bars: [17, 20]
    key_area: I
    schema_sequence: [episode, cadenza_semplice]
    texture: cadential
    end_cadence: authentic

# Subject constraints for validation and derivation
subject_constraints:
  min_notes: 4
  max_notes: 12
  max_bars: 2
  require_invertible: true
  require_answerable: true
  first_degree: [1, 3, 5]
  last_degree: [2, 3, 5, 7]

# Rhythmic vocabulary
rhythmic_vocabulary:
  primary: "1/16"
  characteristic_figures:
    - running_scales
    - turns
  tempo_range: [72, 88]

# Treatment vocabulary and sequence
treatments:
  required: [statement, imitation]
  optional: [transposition, inversion, stretto]
  opening: statement
  answer: imitation

treatment_sequence:
  - {symbol: S, description: "Subject in soprano", duration: [2, 4]}
  - {symbol: A, description: "Answer in bass", duration: [2, 4]}
  - {symbol: episode_1, description: "Free passage", duration: [2, 4]}
  - {symbol: development, description: "Subject/Answer new key", duration: [2, 4]}
  - {symbol: episode_2, description: "Second episode", duration: [2, 4]}
  - {symbol: return, description: "Subject return tonic", duration: [2, 4]}
  - {symbol: coda, description: "Cadential confirmation", duration: [2, 4]}
