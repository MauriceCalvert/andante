# Two-Part Invention
# Bach-style two-voice imitative counterpoint

name: invention

voices:
  - id: upper
    role: schema_upper
  - id: lower
    role: schema_lower

instruments:
  - id: keyboard
    type: harpsichord

scoring:
  upper: keyboard.right_hand
  lower: keyboard.left_hand

tracks:
  upper: {channel: 0, program: 6}
  lower: {channel: 1, program: 6}

form: through_composed
metre: "4/4"
rhythmic_unit: "1/16"
tempo: 100
bass_treatment: contrapuntal

sections:
  - name: exordium
    schema_sequence: [do_re_mi, prinner]
    lead_voice: 0
    follow_voice: 1
    follow_delay: "1/1"
    follow_interval: -7

  - name: narratio
    schema_sequence: [fonte, monte]
    accompany_texture: walking
    lead_voice: 1

  - name: confirmatio
    schema_sequence: [romanesca, fenaroli]
    lead_voice: 0
    follow_voice: 1
    follow_delay: "1/1"
    follow_interval: -7

  - name: peroratio
    schema_sequence: [passo_indietro, cadenza_composta]
    accompany_texture: chordal
    lead_voice: 1
