# Two-Part Invention
# Bach-style two-voice imitative counterpoint

name: invention
voices: 2
form: through_composed
metre: "4/4"
rhythmic_unit: "1/16"
tempo: 100
bass_treatment: contrapuntal

sections:
  - name: exordium
    schema_sequence: [do_re_mi, do_re_mi]
  - name: narratio
    schema_sequence: [episode, monte, monte, monte]
  - name: confirmatio
    schema_sequence: [prinner]
  - name: peroratio
    schema_sequence: [episode, cadenza_semplice]

treatments:
  required: [statement, imitation]
  optional: [transposition, inversion, stretto]
  opening: statement
  answer: imitation

treatment_sequence:
  - symbol: S
    treatment: subject
    subject_voice: 0
    description: "Subject in soprano"
  - symbol: A
    treatment: answer
    subject_voice: 1
    description: "Answer in bass"
  - symbol: episode_1
    treatment: episode
    subject_voice: null
    description: "Free passage"
  - symbol: development
    treatment: development
    subject_voice: null
    description: "Subject/Answer new key"
  - symbol: episode_2
    treatment: episode
    subject_voice: null
    description: "Second episode"
  - symbol: return
    treatment: subject
    subject_voice: 0
    description: "Subject return tonic"
  - symbol: coda
    treatment: cadential
    subject_voice: null
    description: "Cadential confirmation"
