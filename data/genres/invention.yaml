# Two-Part Invention
# Bach-style two-voice imitative counterpoint

name: invention

voices:
  - id: upper
    role: schema_upper
  - id: lower
    role: schema_lower

instruments:
  - id: keyboard
    type: harpsichord

scoring:
  upper: keyboard.right_hand
  lower: keyboard.left_hand

tracks:
  upper: {channel: 0, program: 6}
  lower: {channel: 1, program: 6}

form: through_composed
metre: "4/4"
rhythmic_unit: "1/16"
tempo: 100
bass_treatment: contrapuntal

sections:
  - name: exordium
    schema_sequence: [do_re_mi, do_re_mi]
  - name: narratio
    schema_sequence: [episode, monte, monte, monte]
  - name: confirmatio
    schema_sequence: [prinner]
  - name: peroratio
    schema_sequence: [episode, cadenza_semplice]

# Maps passage functions to voice expansions (per vocabulary.md)
function_map:
  required: [statement, imitation]
  optional: [transposition, inversion, stretto]
  subject: statement
  answer: imitation
  episode: schema
  development: fragmentation
  cadential: repose
  return: statement
  coda: hold

# Passage sequence defines the form structure (per vocabulary.md)
# function: passage function (subject, answer, episode, development, cadential)
# lead_voice: which voice leads (0=upper, 1=lower, null=equal)
passage_sequence:
  - symbol: S
    function: subject
    lead_voice: 0
    description: "Subject in upper voice"
  - symbol: A
    function: answer
    lead_voice: 1
    description: "Answer in lower voice"
  - symbol: E1
    function: episode
    lead_voice: null
    description: "Free passage"
  - symbol: D
    function: development
    lead_voice: null
    description: "Subject/Answer in new key"
  - symbol: E2
    function: episode
    lead_voice: null
    description: "Second episode"
  - symbol: R
    function: subject
    lead_voice: 0
    description: "Subject return in tonic"
  - symbol: C
    function: cadential
    lead_voice: null
    description: "Cadential confirmation"
