# Two-Part Invention
# Bach-style two-voice imitative counterpoint

name: invention
voices: 2
form: through_composed
metre: "4/4"
rhythmic_unit: "1/16"
imitation: mandatory
bass_treatment: contrapuntal

sections:
  - name: exordium
    schema_sequence: [do_re_mi, do_re_mi]
  - name: narratio
    schema_sequence: [episode, monte, monte, monte]
  - name: confirmatio
    schema_sequence: [prinner]
  - name: peroratio
    schema_sequence: [episode, cadenza_semplice]

rhythmic_vocabulary:
  primary: "1/16"
  tempo_range: [72, 88]

subject_constraints:
  min_notes: 4
  max_notes: 12
  max_bars: 2
  require_invertible: true
  require_answerable: true
  first_degree: [1, 3, 5]
  last_degree: [2, 3, 5, 7]

treatments:
  required: [statement, imitation]
  optional: [transposition, inversion, stretto]
  opening: statement
  answer: imitation

treatment_sequence:
  - {symbol: S, description: "Subject in soprano"}
  - {symbol: A, description: "Answer in bass"}
  - {symbol: episode_1, description: "Free passage"}
  - {symbol: development, description: "Subject/Answer new key"}
  - {symbol: episode_2, description: "Second episode"}
  - {symbol: return, description: "Subject return tonic"}
  - {symbol: coda, description: "Cadential confirmation"}
