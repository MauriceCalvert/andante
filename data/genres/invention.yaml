# Two-Part Invention
# Bach-style two-voice imitative counterpoint

name: invention
composition_model: imitative

voices:
  - id: upper
    role: schema_upper
  - id: lower
    role: schema_lower

instruments:
  - id: keyboard
    type: harpsichord

scoring:
  upper: keyboard.right_hand
  lower: keyboard.left_hand

tracks:
  upper: {channel: 0, program: 6}
  lower: {channel: 1, program: 6}

form: through_composed
metre: "4/4"
subject: call_response
rhythmic_unit: "1/16"
tempo: 120
bass_treatment: contrapuntal
tension: arch

thematic:
  voice_count: 2
  invertible_counterpoint: true
  entry_sequence:
    # Exposition (I → V: answer handles transition, no episode)
    - upper: [subject, I]
      lower: none
    - upper: [cs, I]
      lower: [answer, V]
    # --- section boundary: V → vi --- episode auto-inserted if needed
    # Development
    - upper: [subject, vi]
      lower: [cs, vi]
    - upper: [cs, IV]
      lower: [subject, IV]
    # --- section boundary: IV → V --- episode auto-inserted if needed
    # Recapitulation
    - upper: [subject, V]
      lower: [cs, V]
    - {type: stretto, key: I, delay: 2}
    - {type: pedal, degree: 5, bars: 2}
    - cadence

sections:
  - name: exordium
    character: plain
    schema_sequence: [do_re_mi, prinner]
    lead_voice: 0
    accompany_texture: walking
    min_non_cadential: 2

  - name: narratio
    character: energetic
    schema_sequence: [fonte, monte]
    accompany_texture: walking
    lead_voice: 1

  - name: confirmatio
    character: expressive
    schema_sequence: [romanesca, fenaroli]
    lead_voice: 0
    accompany_texture: walking

  - name: peroratio
    character: ornate
    schema_sequence: [fenaroli, passo_indietro, cadenza_composta]
    accompany_texture: chordal
    lead_voice: 1
