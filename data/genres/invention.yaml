# Two-Part Invention (GenreTemplate format)
# Bach-style two-voice imitative counterpoint

name: Two-Part Invention
voices: 2
metre: 4/4
texture: imitative

# Schema selection by formal position
# Only use schemas that exist in schemas.yaml
schema_preferences:
  opening:
    - romanesca
    - do_re_mi
  riposte:
    - prinner
  continuation:
    - fonte
    - monte
    - fenaroli
  pre_cadential:
    - indugio
    - ponte
  cadential:
    - prinner
    - sol_fa_mi

# Cadence planning rules
cadence_template:
  density: high              # Every 2-4 bars
  first_cadence_bar: 4       # Typical first cadence location
  first_cadence_type: half   # Usually half cadence
  section_end_type: half     # At section boundary
  final_type: authentic      # Piece ends PAC on I

# Section structure (binary form)
sections:
  - label: A
    key_area: I
    proportion: 0.5
    end_cadence: half
  - label: B
    key_area: V
    proportion: 0.5
    end_cadence: authentic

# Subject constraints for validation and derivation
subject_constraints:
  min_notes: 4
  max_notes: 12
  max_bars: 2
  require_invertible: true   # Must work in melodic inversion
  require_answerable: true   # Must work at the fifth
  first_degree: [1, 3, 5]    # Allowed starting degrees
  last_degree: [2, 3, 5, 7]  # Avoid strong closure on 1

# Treatment vocabulary
treatments:
  required: [statement, imitation]
  optional: [sequence, inversion, stretto]
  opening: statement
  answer: imitation
