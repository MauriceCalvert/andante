voices: 2
metre: 4/4
upbeat: 0
form: through_composed
arc: invention
min_cs_duration: 1/16
final_cadence_type: invention
bass_source: harmonic # Should be counter_subject, changed to ease testing

# Schema-first planning configuration (planner_design.md)
schema_preferences:
  opening: [romanesca, do_re_mi]
  continuation: [fonte, monte, fenaroli]
  cadential: [prinner, sol_fa_mi]

cadence_template:
  density: high  # Every 2-4 bars
  section_end: half
  final: authentic
  allow_phrygian: false

texture: imitative

subject_rhythm:
  pattern: [1/8, 1/8, 1/8, 1/8, 1/4]
  style: motoric

treatment_constraints:
  must_include: [imitation, stretto]
  start_with: statement
  end_with: statement
  second_phrase: imitation  # Bass answer
sections:
  # Koch-compliant tonal paths:
  # - No I→I (§35)
  # - No V→V in same key (§36)
  # - V→I forbidden at start only (§37)
  - label: A
    repeat: false
    texture: baroque_invention
    tonal_path: [I, V, iii, IV, V]
    final_cadence: half
    bars_per_phrase: 2
  - label: B
    repeat: false
    texture: baroque_invention
    tonal_path: [vi, ii, IV, vi, ii, V, I]
    final_cadence: authentic
    bars_per_phrase: 2
