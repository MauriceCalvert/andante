# Two-Part Invention
# Bach-style two-voice imitative counterpoint

name: invention
composition_model: imitative

voices:
  - id: upper
    role: schema_upper
  - id: lower
    role: schema_lower

instruments:
  - id: keyboard
    type: harpsichord

scoring:
  upper: keyboard.right_hand
  lower: keyboard.left_hand

tracks:
  upper: {channel: 0, program: 6}
  lower: {channel: 1, program: 6}

form: through_composed
metre: "4/4"
rhythmic_unit: "1/16"
tempo: 120
bass_treatment: contrapuntal
tension: arch

thematic:
  voice_count: 2
  invertible_counterpoint: true
  answer_offset_beats: 4
  cadence: cadenza_trillata

  vocabulary:
    exposition:
      # Invariant: this is what makes it an invention
      - upper: [subject, I]
        lower: none
      - upper: [cs, I]
        lower: [answer, V]

    development_entries:
      # Pool: planner picks from these, assigns keys at runtime
      - template: subject_cs    # subject in one voice, cs in the other
        bars: 2

    peroration_entries:
      - template: stretto
      - template: subject_cs
      - template: pedal
        degree: 5
        bars: 2

    key_pool_major: [vi, IV, V, ii, iii]
    key_pool_minor: [III, iv, v, VI, ii]

  # Default brief (used when no external brief is provided)
  brief:
    scope: extended          # short / medium / extended
    # development_entries omitted: scope controls count (short=2, medium=3, extended=5)
    stretto: multiple        # none / single / multiple
    pedal: false
    key_journey_major: [vi, IV, V, ii, iii]
    key_journey_minor: [III, iv, v, VI, ii]
    voice_lead: alternate    # alternate / soprano_heavy / bass_heavy

sections:
  - name: exordium
    character: plain
    schema_sequence: [do_re_mi, prinner]
    lead_voice: 0
    accompany_texture: walking
    min_non_cadential: 2

  - name: narratio
    character: energetic
    schema_sequence: [fonte, monte]
    accompany_texture: walking
    lead_voice: 1

  - name: confirmatio
    character: expressive
    schema_sequence: [romanesca, fenaroli]
    lead_voice: 0
    accompany_texture: walking

  - name: peroratio
    character: ornate
    schema_sequence: [fenaroli, passo_indietro, cadenza_composta]
    accompany_texture: chordal
    lead_voice: 1
