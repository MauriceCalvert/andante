# Two-Part Invention
# Bach-style two-voice imitative counterpoint

name: invention

voices:
  - id: upper
    role: schema_upper
  - id: lower
    role: schema_lower

instruments:
  - id: keyboard
    type: harpsichord

scoring:
  upper: keyboard.right_hand
  lower: keyboard.left_hand

tracks:
  upper: {channel: 0, program: 6}
  lower: {channel: 1, program: 6}

form: through_composed
metre: "4/4"
rhythmic_unit: "1/16"
tempo: 100
bass_treatment: contrapuntal

sections:
  - name: exordium
    schema_sequence: [do_re_mi, do_re_mi]
  - name: narratio
    schema_sequence: [fonte, monte, fenaroli]
  - name: confirmatio
    schema_sequence: [prinner]
  - name: peroratio
    schema_sequence: [passo_indietro, cadenza_semplice]
