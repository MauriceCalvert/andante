# Bass patterns for baroque composition
# Each pattern defines motion type, rhythm, and constraints

harmonic:
  description: Chord roots/fifths on strong beats
  motion: chordal
  # Metre-specific patterns: intervals are relative to chord root (0=root, 4=fifth)
  metres:
    "4/4":
      intervals: [0, 4]        # root, fifth
      durations: [1/2, 1/2]    # half notes
    "3/4":
      intervals: [0, 4, 0]     # root, fifth, root
      durations: [1/4, 1/4, 1/4]
    "2/4":
      intervals: [0, 4]        # root, fifth
      durations: [1/4, 1/4]
    "6/8":
      intervals: [0, 4]        # root, fifth
      durations: [3/8, 3/8]    # dotted quarters
    "2/2":
      intervals: [0, 4]        # root, fifth
      durations: [1/2, 1/2]
  voice_leading:
    max_leap: 12               # semitones
    prefer_step: false         # leaps acceptable
    approach_cadence: step     # approach final by step if possible
  use_when:
    - simple_texture
    - homophonic
    - hymn_style

arpeggiated:
  description: Broken chord tones, free pattern
  motion: arpeggiated
  rhythm:
    notes_per_beat: 2          # typical subdivision
    min_duration: 1/8
  chord_tones:
    primary: [root, third, fifth]
    seventh_chords: [root, third, fifth, seventh]
  direction:
    options: [ascending, descending, alternating, wave]
    default: alternating
  voice_leading:
    max_leap: 12
    stay_in_octave: true       # don't exceed octave range per chord
  use_when:
    - keyboard
    - lighter_texture
    - accompanying

walking:
  description: Stepwise motion between harmonic targets
  motion: stepwise
  rhythm:
    notes_per_beat: 1          # one note per beat typical
    min_duration: 1/4
  intervals:
    primary: [unison, second]  # mostly steps
    occasional: [third]        # small leaps at phrase points
  direction:
    toward_target: true        # approach next chord root
    passing_tones: true        # fill with scale degrees
    neighbour_tones: true      # upper/lower neighbours allowed
  voice_leading:
    max_leap: 4                # semitones (major third)
    leap_recovery: step        # leap followed by step in opposite direction
  use_when:
    - continuous_motion
    - two_part_texture
    - invention_style

chromatic:
  description: Semitone motion for intensity
  motion: chromatic
  rhythm:
    notes_per_beat: 1
    min_duration: 1/4
  intervals:
    primary: [minor_second]
    diatonic_allowed: true     # can mix with diatonic steps
  direction:
    default: descending        # descending more common
    ascending_for: dominants   # ascending approach to dominant
  patterns:
    lament:                    # descending chromatic fourth
      start: 1                 # scale degree
      end: 5                   # scale degree (below)
      semitones: 5             # 1 -> 7 -> b7 -> 6 -> b6 -> 5
    ascending_fourth:
      start: 5
      end: 1
      semitones: 5
  voice_leading:
    max_leap: 2                # semitones
  use_when:
    - lament
    - pathos
    - tension_building

pedal:
  description: Sustained or repeated note under moving harmony
  motion: static
  rhythm:
    style: sustained           # or repeated
    repeated_subdivision: 1/4  # if repeated
  degrees:
    tonic: 1                   # most common
    dominant: 5                # second most common
    other: rare
  duration:
    min_bars: 2
    max_bars: 8
    typical: 4
  placement:
    opening: tonic             # establish key
    climax: dominant           # build tension before resolution
    closing: tonic             # final confirmation
  voice_leading:
    max_leap: 0                # no motion
  use_when:
    - tension
    - opening
    - closing
    - over_dominant

imitative:
  description: Bass enters with melodic subject
  motion: melodic
  rhythm:
    follows_subject: true      # rhythm from subject
  entry:
    intervals: [octave, fifth, fourth]  # below soprano entry
    delay_beats: [2, 4, 8]     # after soprano
    answer_type: [real, tonal] # exact or adjusted for key
  transformations:
    inversion: allowed
    augmentation: allowed
    diminution: allowed
    retrograde: rare
  voice_leading:
    max_leap: 12               # follows subject contour
    independent: true          # not constrained by harmony above
  use_when:
    - fugue
    - invention
    - contrapuntal

# Structural modifiers (apply to any pattern above)
modifiers:
  ostinato:
    description: Repeat bass pattern throughout section
    repeat_length: [2, 4, 8]   # bars
    variation_allowed: false   # strict repeat
    applies_to: [harmonic, arpeggiated, walking, chromatic]
  
  sequence:
    description: Transpose pattern by interval
    intervals: [-2, -3, 2, 3]  # scale degrees, descending thirds common
    repetitions: [2, 3, 4]
    applies_to: [harmonic, walking, arpeggiated]
