# Inner voice patterns for alto and tenor
# These voices fill harmonic gaps with slower, simpler motion

sustained:
  description: Held chord tones for inner voices
  motion: static
  metres:
    "4/4":
      intervals: [0]
      durations: [1/1]
    "3/4":
      intervals: [0]
      durations: [3/4]
    "2/4":
      intervals: [0]
      durations: [1/2]
    "6/8":
      intervals: [0]
      durations: [3/4]
    "2/2":
      intervals: [0]
      durations: [1/1]
  use_when:
    - low_energy
    - moderate_energy
    - homophonic

half_notes:
  description: Two notes per bar for moderate motion
  motion: chordal
  metres:
    "4/4":
      intervals: [0, 2]
      durations: [1/2, 1/2]
    "3/4":
      intervals: [0, 2]
      durations: [1/4, 1/2]
    "2/4":
      intervals: [0, 2]
      durations: [1/4, 1/4]
    "6/8":
      intervals: [0, 2]
      durations: [3/8, 3/8]
    "2/2":
      intervals: [0, 2]
      durations: [1/2, 1/2]
  use_when:
    - rising_energy
    - moderate_energy

quarter_notes:
  description: Four notes per bar for active passages
  motion: stepwise
  metres:
    "4/4":
      intervals: [0, 1, 2, 1]
      durations: [1/4, 1/4, 1/4, 1/4]
    "3/4":
      intervals: [0, 1, 2]
      durations: [1/4, 1/4, 1/4]
    "2/4":
      intervals: [0, 1]
      durations: [1/4, 1/4]
    "6/8":
      intervals: [0, 1, 2]
      durations: [1/4, 1/4, 1/4]
    "2/2":
      intervals: [0, 1, 2, 1]
      durations: [1/4, 1/4, 1/4, 1/4]
  use_when:
    - peak_energy
    - contrapuntal

# Cadential patterns for inner voices
cadential:
  authentic:
    metres:
      "4/4":
        intervals: [1, 0]
        durations: [1/2, 1/2]
      "3/4":
        intervals: [1, 0, 0]
        durations: [1/4, 1/4, 1/4]
      "2/4":
        intervals: [1, 0]
        durations: [1/4, 1/4]
      "6/8":
        intervals: [1, 0]
        durations: [3/8, 3/8]
      "2/2":
        intervals: [1, 0]
        durations: [1/2, 1/2]
  half:
    metres:
      "4/4":
        intervals: [0, 1]
        durations: [1/2, 1/2]
      "3/4":
        intervals: [0, 1, 1]
        durations: [1/4, 1/4, 1/4]
      "2/4":
        intervals: [0, 1]
        durations: [1/4, 1/4]
      "6/8":
        intervals: [0, 1]
        durations: [3/8, 3/8]
      "2/2":
        intervals: [0, 1]
        durations: [1/2, 1/2]
