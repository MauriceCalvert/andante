# Treatment cycles for melodic variation
# Controls how transforms are selected based on bar and phrase position

# Bar continuation: transforms applied to bars after the first in a phrase
# Each entry: [transform_name, shift]
bar_continuation:
  - [transposition, -2]
  - [retrograde, 0]
  - [transposition, -3]
  - [head, -1]
  - [transposition, 2]
  - [retrograde, -2]
  - [transposition, -4]
  - [head, 0]

# Phrase transforms: applied to bar 0 when phrase treatment is "statement"
# Cycles through these to ensure phrase-to-phrase variety
phrase_transforms:
  - statement
  - retrograde
  - statement
  - head
  - retrograde
  - statement

# Mapping from plan treatment names to transforms.yaml transform names
treatment_mapping:
  statement: statement
  imitation: retrograde
  sequence: transposition
  inversion: inversion
  stretto: stretto
  augmentation: augmentation
  diminution: diminution
  fragmentation: head
  retrograde: retrograde
