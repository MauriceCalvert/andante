# Melodic transforms
# Missing pitch/duration keys default to unchanged

statement: {}

inversion:
  pitch: negate

retrograde:
  pitch: reverse
  duration: reverse

augmentation:
  duration: augment

diminution:
  duration: diminish

# Compound transforms
inversion_augmented:
  pitch: negate
  duration: augment

inversion_diminished:
  pitch: negate
  duration: diminish

retrograde_inversion:
  pitch: negate
  # Note: for true retrograde-inversion, apply retrograde then inversion
  # This is a simplified version that just negates

# Transposition (n provided at apply time)
transposition:
  pitch: transpose(0)
