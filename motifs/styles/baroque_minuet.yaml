# Baroque Minuet Style for Motif Generation
# 3/4 meter, elegant dance character

name: baroque_minuet

rhythm:
  meter: [3, 4]
  allow_rests: false
  min_notes: 5
  max_notes: 10
  groupings:
    # Full bar patterns
    - pattern: [0.25, 0.25, 0.25]
      weight: 1.2
    - pattern: [0.25, 0.125, 0.125, 0.25]
      weight: 1.0
    - pattern: [0.125, 0.125, 0.25, 0.25]
      weight: 1.0
    # Half bar patterns
    - pattern: [0.25, 0.25]
      weight: 0.8
    - pattern: [0.25, 0.125, 0.125]
      weight: 1.0
    - pattern: [0.125, 0.125, 0.25]
      weight: 0.9
    # Dotted patterns (graceful)
    - pattern: [0.1875, 0.0625, 0.25]
      weight: 0.7
    - pattern: [0.375, 0.125, 0.25]
      weight: 0.6
    # Upbeat feel
    - pattern: [0.125, 0.125, 0.125, 0.125]
      weight: 0.5

intervals:
  max_interval: 4  # Smaller leaps for elegance
  step_threshold: 1
  step_inertia_boost: 1.2
  weights:
    0: 0.10     # unison
    1: 0.22     # second up
    -1: 0.24    # second down
    2: 0.14     # third up
    -2: 0.16    # third down
    3: 0.04     # fourth up
    -3: 0.05    # fourth down
    4: 0.02     # fifth up
    -4: 0.03    # fifth down
  first_weights:
    0: 0.05
    1: 0.28
    -1: 0.32
    2: 0.15
    -2: 0.20

contour:
  prefer_arch: true
  prefer_descent: false
  range_min: 0
  range_max: 10

target_duration_min: 0.5   # Shorter motifs
target_duration_max: 0.75

scale_pattern: [0, 2, 4, 5, 7, 9, 11]
